<head>

<title>Cockpit Projets BI · V6.8A Offres client</title>
<style>
:root{--bg:#030711;--bg2:#06112a;--panel:rgba(7,18,41,.84);--panel2:rgba(9,28,61,.74);--cyan:#28eaff;--blue:#197bff;--green:#35f384;--violet:#b45dff;--orange:#ffc34d;--red:#ff6472;--txt:#f5fbff;--muted:#9ec5df;--line:rgba(80,178,255,.28);--r:24px;--shadow:0 0 30px rgba(22,143,255,.18),inset 0 0 26px rgba(37,177,255,.045)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;color:var(--txt);background:radial-gradient(circle at 50% 8%,#103a75 0,#06122a 38%,#02040d 100%);overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:radial-gradient(circle at 8% 8%,rgba(29,151,255,.22),transparent 22%),radial-gradient(circle at 88% 14%,rgba(53,243,132,.12),transparent 24%),radial-gradient(circle at 72% 84%,rgba(180,93,255,.16),transparent 26%),linear-gradient(115deg,rgba(255,255,255,.04) 0 1px,transparent 1px 120px)}body:after{content:"";position:fixed;inset:-40px;z-index:-1;pointer-events:none;background-image:radial-gradient(rgba(42,220,255,.42) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 50% 22%,black,transparent 74%);opacity:.13}
button,input,select,textarea{font-family:inherit}button{cursor:pointer;color:var(--txt);border:0}.app{padding:18px clamp(10px,1.4vw,22px)}.header{display:grid;grid-template-columns:minmax(420px,1fr) minmax(420px,650px);gap:14px;margin-bottom:14px}.brand,.actions,.panel,.card,.hero,.kpi,.offer,.module-tile{border:1px solid var(--line);background:linear-gradient(145deg,rgba(8,20,45,.84),rgba(4,9,26,.78));box-shadow:var(--shadow);border-radius:var(--r);position:relative;overflow:hidden}.brand:before,.actions:before,.panel:before,.card:before,.hero:before,.kpi:before,.offer:before,.module-tile:before{content:"";position:absolute;inset:0;background:linear-gradient(105deg,rgba(255,255,255,.055),transparent 30%,transparent 78%,rgba(42,234,255,.035));pointer-events:none}.brand{display:flex;align-items:center;gap:18px;padding:18px 20px}.logo{width:76px;height:76px;border-radius:24px;display:grid;place-items:center;font-size:34px;font-weight:950;background:radial-gradient(circle at 35% 25%,#64f8ff,#0d80ff 48%,#071229 75%);box-shadow:0 0 28px rgba(34,180,255,.60),inset 0 0 22px rgba(255,255,255,.12);flex:0 0 76px}.logo:after{content:"";position:absolute;inset:-7px;border-radius:29px;border:1px dashed rgba(40,234,255,.5)}h1{margin:0;font-size:clamp(30px,3.8vw,50px);line-height:.96;text-transform:uppercase;letter-spacing:.018em;text-shadow:0 0 20px rgba(40,234,255,.30)}.subtitle{margin:8px 0 0;color:var(--cyan);font-weight:850}.actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:14px;flex-wrap:wrap}.btn,.mini{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 13px;border-radius:14px;border:1px solid rgba(89,190,255,.35);background:linear-gradient(180deg,rgba(12,39,78,.92),rgba(7,18,42,.91));box-shadow:0 0 14px rgba(28,143,255,.10);font-weight:950;font-size:13px}.btn:hover,.mini:hover{border-color:rgba(74,229,255,.8);box-shadow:0 0 20px rgba(40,234,255,.18)}.green{border-color:rgba(53,243,132,.50)}.violet{border-color:rgba(180,93,255,.55)}.orange{border-color:rgba(255,195,77,.55)}.red{border-color:rgba(255,100,114,.58)}.layout{display:grid;grid-template-columns:350px minmax(0,1fr) 360px;gap:14px;align-items:start}.panel{padding:16px}.panel h2,.panel h3{margin:0 0 12px}.field{display:grid;gap:6px;margin-bottom:9px}.field label{font-size:12px;color:var(--muted);font-weight:850}input,select,textarea{width:100%;padding:10px 11px;border-radius:13px;border:1px solid rgba(87,174,238,.30);background:rgba(3,10,25,.72);color:#effbff;outline:none}textarea{min-height:78px;resize:vertical}.filter{display:grid;grid-template-columns:1fr 1fr;gap:8px}.filter input{grid-column:1/-1}.list{display:flex;flex-direction:column;gap:8px;max-height:670px;overflow:auto;padding-right:4px}.card{display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center;padding:10px;border-radius:17px;background:linear-gradient(135deg,rgba(9,31,69,.70),rgba(5,12,31,.70));transition:.15s}.card:hover{transform:translateX(2px);border-color:rgba(40,234,255,.55)}.card.active{border-color:rgba(40,234,255,.95);box-shadow:0 0 21px rgba(40,234,255,.17),inset 0 0 18px rgba(40,234,255,.05)}.card.child{margin-left:18px;width:calc(100% - 18px);border-left:2px solid rgba(255,195,77,.52)}.card.child:before{content:"";position:absolute;left:-18px;top:25px;width:16px;height:2px;background:rgba(255,195,77,.65);box-shadow:0 0 10px rgba(255,195,77,.25)}.ico{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;font-size:25px;border:1px solid rgba(92,202,255,.28);background:rgba(37,142,255,.13)}.card h3{margin:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.muted{color:var(--muted)}.meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;border:1px solid rgba(101,189,255,.30);background:rgba(10,35,72,.50);font-size:11px;color:#d7edff;white-space:nowrap;font-weight:850}.pill.green{border-color:rgba(53,243,132,.48);color:#d9ffe7}.pill.orange{border-color:rgba(255,195,77,.52);color:#ffe2a5}.pill.violet{border-color:rgba(180,93,255,.46);color:#ebd5ff}.pill.red{border-color:rgba(255,100,114,.52);color:#ffc8cd}.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--cyan);box-shadow:0 0 10px currentColor}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{padding:9px 11px;border-radius:13px;border:1px solid rgba(89,190,255,.35);background:rgba(7,18,42,.78);font-weight:900}.tab.active{background:linear-gradient(180deg,rgba(38,116,255,.75),rgba(57,20,126,.70));border-color:rgba(180,93,255,.80)}.hero{padding:18px;margin-bottom:14px;border-color:rgba(180,93,255,.44)}.hero h2{font-size:28px;margin:0 0 8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{padding:14px}.kpi small{color:var(--muted);font-weight:850}.kpi b{display:block;font-size:28px;margin-top:4px}.offers{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.offer{padding:15px;border-radius:20px}.offer.active{border-color:rgba(53,243,132,.75);box-shadow:0 0 28px rgba(53,243,132,.15)}.offer h3{font-size:19px}.price{font-size:26px;font-weight:950;color:var(--cyan)}.module-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.module-tile{padding:14px;border-radius:20px}.module-tile h3{display:flex;align-items:center;gap:9px}.checks{display:grid;gap:8px;margin-top:10px}.check{display:flex;align-items:center;gap:8px;color:#d8edfb;font-size:13px}.check span{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:rgba(40,234,255,.09);border:1px solid rgba(40,234,255,.24)}.road{display:grid;gap:8px}.road-row{display:grid;grid-template-columns:90px 1fr 80px;gap:8px;align-items:center;padding:10px;border-radius:14px;border:1px solid rgba(90,180,255,.20);background:rgba(4,13,31,.62)}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.28);border:1px solid rgba(90,180,255,.18);border-radius:16px;padding:12px;color:#d8f7ff;max-height:360px;overflow:auto}.toast{position:fixed;right:18px;bottom:18px;background:rgba(6,20,43,.96);border:1px solid rgba(40,234,255,.55);border-radius:16px;padding:12px 14px;box-shadow:0 0 30px rgba(40,234,255,.22);opacity:0;transform:translateY(12px);transition:.2s;z-index:50}.toast.show{opacity:1;transform:translateY(0)}.empty{padding:20px;text-align:center;color:var(--muted);border:1px dashed rgba(101,189,255,.25);border-radius:18px}.module-badge{font-size:10px;color:#ffe8ad;display:block;margin-top:4px}@media(max-width:1180px){.header,.layout{grid-template-columns:1fr}.grid,.offers,.module-grid{grid-template-columns:1fr 1fr}}@media(max-width:720px){.grid,.offers,.module-grid,.filter{grid-template-columns:1fr}.actions{justify-content:flex-start}.btn{width:100%;justify-content:flex-start}}
</style>
</head>
<body>
<div class="app">
<header class="header">
<section class="brand"><div class="logo">BI</div><div><h1>Cockpit Projets BI</h1><p class="subtitle">V6.8A · Offres client + modules automatiques</p></div></section>
<section class="actions"><button class="btn green" onclick="openWizard()">＋ Projet client</button><button class="btn violet" onclick="exportJson()">⌘ Export JSON</button><label class="btn orange" for="importFile">⬆ Import</label><input id="importFile" type="file" accept=".json,application/json" hidden><button class="btn red" onclick="resetDemo()">↺ Démo</button></section>
</header>
<main class="layout">
<aside class="panel"><h2>Projets & sous-modules</h2><div class="filter"><input id="q" placeholder="Rechercher client, module, tag..."><select id="space"><option>Tous</option><option>Pro Clients</option><option>Perso</option><option>Pro Merlet</option></select><select id="status"><option>Tous</option><option>À cadrer</option><option>V0</option><option>En cours</option><option>Livré</option></select></div><div class="list" id="list"></div></aside>
<section class="panel"><div class="tabs" id="tabs"></div><div id="main"></div></section>
<aside class="panel" id="right"></aside>
</main>
</div><div class="toast" id="toast"></div>
<script>
'use strict';
const VERSION='V6.8A-offres-client-modules-auto';
const KEY='bi_central_v68a_offres_client_state';
const today=()=>new Date().toISOString().slice(0,10);const now=()=>new Date().toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'short'});const uid=()=>Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const slug=s=>String(s||'projet').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)||'projet';
const MODULES={
commerce:{id:'commerce',icon:'🛒',name:'BI Commerce',desc:'Produits, prix, étiquettes, commandes et stock simple.',features:['Produits','Prix','Étiquettes','Commandes','Stock simple'],tabs:['Dashboard','Produits','Prix','Étiquettes','Commandes','Stock'],road:['Importer produits','Paramétrer prix TTC / unité','Générer étiquettes','Tester commande fournisseur']},
clients:{id:'clients',icon:'👥',name:'BI Clients & Commandes',desc:'Suivi clients, demandes, commandes, relances et historique.',features:['Clients','Demandes','Commandes','Relances','Suivi'],tabs:['Accueil','Clients','Demandes','Commandes','Relances','Suivi'],road:['Créer fiche client','Saisir demandes types','Préparer relances','Suivre commandes ouvertes']},
planning:{id:'planning',icon:'📅',name:'BI Planning & Activité',desc:'Planning, tâches, équipe, échéances et vue de synthèse.',features:['Planning','Tâches','Équipe','Échéances','Vue synthèse'],tabs:['Planning','Tâches','Équipe','Échéances','Synthèse'],road:['Créer calendrier simple','Lister tâches récurrentes','Définir échéances','Tester vue semaine / mois']},
facturation:{id:'facturation',icon:'📄',name:'BI Facturation',desc:'Devis, factures, encaissements, livre recettes et exports.',features:['Devis','Factures','Encaissements','Livre recettes','Exports'],tabs:['Devis','Factures','Encaissements','Recettes','Exports'],road:['Modèle devis','Modèle facture','Suivi encaissements','Export livre recettes']},
ia:{id:'ia',icon:'🤖',name:'Assistant IA',desc:'Prompts, aide saisie, synthèse client, génération notes et livrables.',features:['Prompts','Synthèse','Aide saisie','Notes auto','Livrables'],tabs:['Prompts','Synthèse','Aide','Notes','Livrables'],road:['Définir prompts métiers','Créer fiche aide client','Préparer synthèse automatique','Identifier limites IA']},
drive:{id:'drive',icon:'🗂️',name:'Drive Sync & Livraison',desc:'Structure Drive, liens GitHub, ZIP, README et versions.',features:['Drive','GitHub','Versions','ZIP','README'],tabs:['Drive','GitHub','Versions','Pack','README'],road:['Créer arborescence Drive','Préparer chemin GitHub','Exporter pack V0','Rédiger README livraison']}
};
const OFFERS={
decouverte:{id:'decouverte',name:'Découverte',price:'99 € + 39 €/mois',tag:'ultra simple',modules:['clients','facturation'],desc:'Pour très petit budget : suivi client, commandes et facturation légère.'},
standard:{id:'standard',name:'Standard',price:'190 € + 69 €/mois',tag:'offre cœur',modules:['commerce','clients','planning','facturation'],desc:'Les 4 modules de base de l’image : commerce, clients, planning et facturation.'},
confort:{id:'confort',name:'Confort',price:'390 € + 99 €/mois',tag:'clé en main',modules:['commerce','clients','planning','facturation','ia','drive'],desc:'Standard + assistant IA + structure Drive/GitHub/livraison complète.'}
};
const TABS=[['fiche','🧭 Fiche'],['offres','🏷️ Offres'],['modules','🧩 Modules'],['roadmap','📈 Roadmap'],['deploy','🚀 Déploiement']];
let active='fiche', selected='', wizard=false;
let wiz={name:'Nouveau client',client:'Client / commerce',space:'Pro Clients',offer:'standard',desc:'Solution BI simple, réutilisable et adaptée au terrain.',delivery:'GitHub Pages / ZIP'};
function seed(){const state={updated:new Date().toISOString(),projects:[]};createClientProject(state,{name:'Client démo Cévennes',client:'Commerce bio / artisan',space:'Pro Clients',offer:'standard',desc:'Base standard : commerce, clients, planning et facturation.',delivery:'GitHub Pages / ZIP'},false);return state}
let state=load();function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}function save(msg='maj'){state.updated=new Date().toISOString();localStorage.setItem(KEY,JSON.stringify(state));toast(msg)}function selectedProject(){return state.projects.find(p=>p.id===selected)||state.projects[0]||null}function childrenOf(id){return state.projects.filter(p=>p.parentId===id)}function parentOf(p){return p?.parentId?state.projects.find(x=>x.id===p.parentId):null}
function moduleRoadmap(moduleId,projectName){const m=MODULES[moduleId];return (m?.road||[]).map((title,i)=>({id:uid(),title,type:i?'Action':'Initialisation',status:i?'À faire':'À valider',priority:i<2?'Haute':'Moyenne',text:`${title} · ${m.name} · ${projectName}`,created:now(),updated:now()}))}
function makeModule(parent,s,moduleId){const m=MODULES[moduleId];const id=slug(parent.name+'-'+m.id);return {id,name:m.name,icon:m.icon,kind:'subobject',parentId:parent.id,space:parent.space,type:'Sous-module client',client:parent.client,offer:s.offer,phase:'V0',status:'À cadrer',progress:8,goal:m.desc,nextAction:m.road[0]||'Cadrer le module',tabs:m.tabs,features:m.features,tags:['module-client',m.id,s.offer],sources:{githubRepo:'Koink30/bi-central',githubPath:`apps/${slug(parent.name)}/modules/${m.id}/`,pagesUrl:`https://koink30.github.io/bi-central/apps/${slug(parent.name)}/modules/${m.id}/`,driveFolder:`BI_${slug(parent.client).toUpperCase()}/03_HTML_BI/modules/${m.id}/`,githubStatus:'Prévu'},roadmapBlocks:moduleRoadmap(m.id,parent.name),notes:[{id:uid(),title:'Brief module',text:m.desc,date:now()}],versions:[{id:uid(),version:'V0.1',title:'Module créé automatiquement',date:now(),text:'Module généré par V6.8A.'}]}}
function createClientProject(target,s,notify=true){const offer=OFFERS[s.offer]||OFFERS.standard;const id=slug(s.name);if(target.projects.some(p=>p.id===id)){selected=id;if(notify)toast('Projet déjà existant');return}const parent={id,name:s.name,icon:'🏢',kind:'parent',parentId:null,space:s.space,type:'Projet client BI',client:s.client,offer:s.offer,phase:'Cadrage',status:'V0',progress:12,goal:s.desc,nextAction:'Valider le périmètre puis générer le pack V0.',delivery:s.delivery,tags:['client',s.offer,'offre-pack'],features:['Base standard','Personnalisation légère','Livraison clé en main'],sources:{githubRepo:'Koink30/bi-central',githubPath:`apps/${id}/`,pagesUrl:`https://koink30.github.io/bi-central/apps/${id}/`,driveFolder:`BI_${slug(s.client).toUpperCase()}_${id.toUpperCase()}/`,githubStatus:'Prévu'},roadmapBlocks:[{id:uid(),title:'Création projet client',type:'Initialisation',status:'À valider',priority:'Haute',text:`Projet ${s.name} créé avec l’offre ${offer.name}. Modules : ${offer.modules.map(k=>MODULES[k].name).join(', ')}`,created:now(),updated:now()},{id:uid(),title:'Préparer structure Drive',type:'Action',status:'À faire',priority:'Moyenne',text:'00_ADMIN, 01_BRIEF_CLIENT, 02_DONNEES, 03_HTML_BI, 04_EXPORTS, 05_LIVRABLES, 06_ARCHIVES, 99_NOTES_DEV',created:now(),updated:now()},{id:uid(),title:'Générer prototype V0',type:'Action',status:'À faire',priority:'Haute',text:'Créer index.html, manifest.json, roadmap.json, data-demo.json et README.md.',created:now(),updated:now()}],notes:[{id:uid(),title:'Brief initial',text:s.desc,date:now()}],versions:[{id:uid(),version:'V0.1',title:'Projet client + modules créés',date:now(),text:'Création automatique depuis V6.8A.'}]};target.projects.push(parent);offer.modules.forEach(mid=>target.projects.push(makeModule(parent,s,mid)));selected=parent.id;if(notify){save('Projet client + modules créés');renderAll()}}
function renderAll(){renderTabs();renderList();renderMain();renderRight();if(wizard)renderWizard()}function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab ${active===t[0]?'active':''}" onclick="active='${t[0]}';renderAll()">${t[1]}</button>`).join('')}
function renderList(){const q=document.getElementById('q')?.value.toLowerCase()||'';const sp=document.getElementById('space')?.value||'Tous';const st=document.getElementById('status')?.value||'Tous';let roots=state.projects.filter(p=>!p.parentId);let html='';roots.forEach(p=>{const fam=[p,...childrenOf(p.id)];if(!fam.some(x=>(sp==='Tous'||x.space===sp)&&(st==='Tous'||x.status===st)&&[x.name,x.client,x.type,(x.tags||[]).join(' ')].join(' ').toLowerCase().includes(q)))return;html+=card(p);childrenOf(p.id).forEach(c=>{if((sp==='Tous'||c.space===sp)&&(st==='Tous'||c.status===st)&&[c.name,c.client,c.type,(c.tags||[]).join(' ')].join(' ').toLowerCase().includes(q))html+=card(c,true)})});document.getElementById('list').innerHTML=html||'<div class="empty">Aucun projet.</div>';document.querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>{selected=el.dataset.id;renderAll()})}
function card(p,child=false){const offer=OFFERS[p.offer]?.name||'';return `<div class="card ${selectedProject()?.id===p.id?'active':''} ${child?'child':''}" data-id="${p.id}"><div class="ico">${p.icon}</div><div><h3>${esc(p.name)}</h3>${child?`<span class="module-badge">↳ lié à : ${esc(parentOf(p)?.name||'parent')}</span>`:''}<div class="meta"><span class="pill"><span class="dot"></span>${esc(p.status)}</span><span class="pill ${child?'orange':'green'}">${esc(child?'module':offer||p.space)}</span></div></div><div>☆</div></div>`}
function renderMain(){const p=selectedProject();if(!p){document.getElementById('main').innerHTML='<div class="empty">Crée un projet client.</div>';return}if(active==='fiche')return renderFiche(p);if(active==='offres')return renderOffers();if(active==='modules')return renderModules(p);if(active==='roadmap')return renderRoadmap(p);if(active==='deploy')return renderDeploy(p)}
function renderFiche(p){const childs=childrenOf(p.id);document.getElementById('main').innerHTML=`<section class="hero"><h2>${p.icon} ${esc(p.name)}</h2><p class="muted">${esc(p.goal)}</p><div class="meta"><span class="pill green">${esc(p.type)}</span><span class="pill violet">${esc(OFFERS[p.offer]?.name||'module')}</span><span class="pill orange">${esc(p.phase)}</span></div></section><div class="grid"><div class="kpi"><small>Modules</small><b>${childs.length||'—'}</b></div><div class="kpi"><small>Roadmap</small><b>${(p.roadmapBlocks||[]).length}</b></div><div class="kpi"><small>Avancement</small><b>${p.progress||0}%</b></div><div class="kpi"><small>Version</small><b>${p.versions?.[0]?.version||'V0.1'}</b></div></div><section class="panel" style="margin-top:14px"><h3>Prochaine action</h3><p>${esc(p.nextAction)}</p></section>`}
function renderOffers(){document.getElementById('main').innerHTML=`<section class="hero"><h2>🏷️ Offres à proposer</h2><p class="muted">Logique intégrée : base standard + personnalisation légère + livraison clé en main.</p></section><div class="offers">${Object.values(OFFERS).map(o=>`<div class="offer ${wiz.offer===o.id?'active':''}" onclick="wiz.offer='${o.id}';renderAll()"><h3>${esc(o.name)}</h3><div class="price">${esc(o.price)}</div><p class="muted">${esc(o.desc)}</p><div class="meta"><span class="pill green">${o.modules.length} module(s)</span><span class="pill orange">${esc(o.tag)}</span></div></div>`).join('')}</div>`}
function renderModules(p){const list=p.parentId?[p]:childrenOf(p.id);document.getElementById('main').innerHTML=`<section class="hero"><h2>🧩 Modules automatiques</h2><p class="muted">Chaque module devient un sous-objet BI avec ses onglets, sa roadmap et son chemin de livraison.</p></section><div class="module-grid">${list.map(m=>`<div class="module-tile"><h3>${m.icon} ${esc(m.name)}</h3><p class="muted">${esc(m.goal)}</p><div class="checks">${(m.features||[]).map(f=>`<div class="check"><span>✓</span>${esc(f)}</div>`).join('')}</div></div>`).join('')||'<div class="empty">Aucun module.</div>'}</div>`}
function renderRoadmap(p){const blocks=[...(p.roadmapBlocks||[]),...(!p.parentId?childrenOf(p.id).flatMap(c=>(c.roadmapBlocks||[]).slice(0,2)):[])];document.getElementById('main').innerHTML=`<section class="hero"><h2>📈 Roadmap projet</h2><p class="muted">Roadmap générée automatiquement depuis l’offre et les modules.</p></section><div class="road">${blocks.map(b=>`<div class="road-row"><span class="pill ${b.status==='À valider'?'orange':'green'}">${esc(b.status)}</span><b>${esc(b.title)}</b><span>${esc(b.priority||'')}</span></div>`).join('')||'<div class="empty">Aucune roadmap.</div>'}</div>`}
function manifest(p){return JSON.stringify({version:VERSION,project:p.name,client:p.client,offer:p.offer,kind:p.kind,github_path:p.sources?.githubPath,pages_url:p.sources?.pagesUrl,drive_folder:p.sources?.driveFolder,modules:childrenOf(p.id).map(c=>({id:c.id,name:c.name,tabs:c.tabs,features:c.features,path:c.sources?.githubPath})),roadmap:(p.roadmapBlocks||[]).map(b=>b.title)},null,2)}
function readme(p){return `# ${p.name}\n\nClient : ${p.client}\nOffre : ${OFFERS[p.offer]?.name||p.offer}\nVersion : ${VERSION}\n\n## Principe\nBase standard + personnalisation légère + livraison clé en main.\n\n## Modules\n${childrenOf(p.id).map(c=>'- '+c.icon+' '+c.name+' : '+(c.features||[]).join(', ')).join('\n')}\n\n## Liens\nGitHub : ${p.sources?.githubPath}\nURL : ${p.sources?.pagesUrl}\nDrive : ${p.sources?.driveFolder}\n`}
function renderDeploy(p){const root=p.parentId?parentOf(p):p;document.getElementById('main').innerHTML=`<section class="hero"><h2>🚀 Déploiement V0</h2><p class="muted">Structure prête pour GitHub / Drive / livraison client. Pas de push automatique depuis cette page.</p><button class="mini green" onclick="copyText(manifest(selectedProject()))">Copier manifest</button> <button class="mini" onclick="copyText(readme(${JSON.stringify(root.id)}))">Copier README</button></section><pre>${esc(manifest(root))}</pre>`}
function renderRight(){const p=selectedProject();const root=p?.parentId?parentOf(p):p;document.getElementById('right').innerHTML=`<h2>Analyse V6.8A</h2><div class="checks"><div class="check"><span>✓</span>Reprise Projet / Sous-objet</div><div class="check"><span>✓</span>Offres client packagées</div><div class="check"><span>✓</span>Modules de l’image intégrés</div><div class="check"><span>✓</span>Roadmap + chemins Drive/GitHub</div></div><h3 style="margin-top:16px">Projet racine</h3><p class="muted">${esc(root?.name||'—')}</p><h3>Chemins</h3><pre>${esc(root?`GitHub: ${root.sources.githubPath}\nURL: ${root.sources.pagesUrl}\nDrive: ${root.sources.driveFolder}`:'—')}</pre><button class="btn green" onclick="openWizard()">Créer un autre projet client</button>`}
function openWizard(){wizard=true;renderWizard()}function closeWizard(){wizard=false;document.getElementById('wizard')?.remove()}function renderWizard(){let el=document.getElementById('wizard');if(!el){el=document.createElement('div');el.id='wizard';document.body.appendChild(el)}el.innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:40;display:grid;place-items:center;padding:18px" onclick="if(event.target===this)closeWizard()"><div class="panel" style="width:min(980px,96vw);max-height:92vh;overflow:auto"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2>＋ Nouveau projet client automatisé</h2><button class="mini" onclick="closeWizard()">Fermer</button></div><div class="module-grid"><div><div class="field"><label>Nom du BI client</label><input value="${esc(wiz.name)}" oninput="wiz.name=this.value"></div><div class="field"><label>Client / activité</label><input value="${esc(wiz.client)}" oninput="wiz.client=this.value"></div><div class="field"><label>Espace</label><select onchange="wiz.space=this.value"><option ${wiz.space==='Pro Clients'?'selected':''}>Pro Clients</option><option ${wiz.space==='Perso'?'selected':''}>Perso</option><option ${wiz.space==='Pro Merlet'?'selected':''}>Pro Merlet</option></select></div><div class="field"><label>Description</label><textarea oninput="wiz.desc=this.value">${esc(wiz.desc)}</textarea></div></div><div><h3>Offre</h3>${Object.values(OFFERS).map(o=>`<div class="offer ${wiz.offer===o.id?'active':''}" style="margin-bottom:8px" onclick="wiz.offer='${o.id}';renderWizard()"><h3>${o.name}</h3><div class="price">${o.price}</div><p class="muted">${o.desc}</p></div>`).join('')}</div></div><button class="btn green" onclick="createClientProject(state,wiz);closeWizard()">Créer projet + sous-modules</button></div></div>`}
function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BI_Central_V68A_offres_client.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);toast('Export JSON généré')}document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save('Import OK');selected=state.projects?.[0]?.id||'';renderAll()}catch(err){toast('JSON invalide')}};r.readAsText(f);e.target.value=''};function resetDemo(){localStorage.removeItem(KEY);state=seed();selected=state.projects[0]?.id||'';save('Démo rechargée');renderAll()}function copyText(txt){if(typeof txt==='string'&&state.projects.some(p=>p.id===txt))txt=readme(state.projects.find(p=>p.id===txt));navigator.clipboard?.writeText(txt);toast('Copié')}function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),1700)}
document.getElementById('q').oninput=renderList;document.getElementById('space').onchange=renderList;document.getElementById('status').onchange=renderList;if(!selected)selected=state.projects[0]?.id||'';renderAll();
</script>
</body>
