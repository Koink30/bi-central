kpit reste la source','Cette feuille lit et synthétise, sans devenir un second formulaire.'],['Template duplicable','Un modèle client doit être nettoyable rapidement.']]};let data=load(),sel=data.projects[0].id,view='hub',filter='Tous',pos=JSON.parse(localStorage.getItem(P)||'{}');function load(){try{return norm(JSON.parse(localStorage.getItem(S)))}catch(e){return demo}}function norm(x){let a=(x&&x.projects)||demo.projects;return{projects:a.map((p,i)=>({id:p.id||'p'+i,name:p.name||p.title||'Projet',icon:p.icon||'🧩',family:p.family||p.famille||'Interne',status:p.status||p.statut||'À traiter',progress:+(p.progress??p.pct??0),value:+(p.value??70),automation:+(p.automation??35),risk:+(p.risk??40),stage:p.stage||'prototype',notes:p.notes||'',priority:p.priority||'moyenne'})),academy:(x&&x.academy)||demo.academy}}let esc=s=>String(s??'').replace(/[&<>']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;'}[m])),mat=p=>Math.round(p.progress*.4+p.value*.25+p.automation*.15+(100-p.risk)*.2),cur=()=>data.projects.filter(p=>filter=='Tous'||p.family==filter),pickp=()=>data.projects.find(p=>p.id==sel)||data.projects[0],next=p=>p.risk>58?'Traiter le blocage.':p.progress<35?'Cadrer le besoin.':p.stage=='test'?'Faire la recette utilisateur.':'Définir la prochaine action.';function save(){localStorage.setItem(S,JSON.stringify(data));localStorage.setItem(P,JSON.stringify(pos))}function render(){hudR();filR();mapR();detailR();missionsR();levelsR();templatesR();academyR();save()}function hudR(){let n=data.projects.length,avg=Math.round(data.projects.reduce((a,p)=>a+p.progress,0)/n),b=data.projects.filter(p=>p.risk>58).length;hud.innerHTML=[['🧩','Projets',n],['⚡','Avancement',avg+'%'],['🟢','Maturité',Math.round(data.projects.reduce((a,p)=>a+mat(p),0)/n)+'%'],['⚠️','Alertes',b],['🤖','Automation',Math.round(data.projects.reduce((a,p)=>a+p.automation,0)/n)+'%']].map(k=>`<div class='k'><small>${k[0]} ${k[1]}</small><b>${k[2]}</b></div>`).join('')}function filR(){filters.innerHTML=['Tous',. utilisable.'}</div>`).join('')}function academyR(){academy.innerHTML=data.academy.map(e=>`<div class='item'><b>${esc(e[0]||e.title)}</b>${esc(e[1]||e.body)}</div>`).join('')}function active(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v==view))}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{view=b.dataset.v;active();render()});importBtn.onclick=()=>{json.value=JSON.stringify(data,null,2);drawer.classList.add('show')};exportBtn.onclick=()=>{json.value=JSON.stringify(data,null,2);drawer.classList.add('show')};close.onclick=()=>drawer.classList.remove('show');pick.onclick=()=>file.click();file.onchange=e=>{let f=e.target.files[0],r=new FileReader();r.onload=()=>{data=norm(JSON.parse(r.result));sel=data.projects[0].id;pos={};render();drawer.classList.remove('show')};r.readAsText(f)};copy.onclick=()=>navigator.clipboard.writeText(json.value);download.onclick=()=>{let a=document.createElement('a'),b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});a.href=URL.createObjectURL(b);a.download='BI_FEUILLE_ROUTE_snapshot.json';a.click()};demoBtn.onclick=()=>{data=demo;sel=data.projects[0].id;pos={};render()};resetBtn.onclick=()=>{localStorage.removeItem(S);localStorage.removeItem(P);data=demo;sel=data.projects[0].id;pos={};render()};render()</script></body></html>
