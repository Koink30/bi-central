function bytesLabel(n){
  n=Number(n)||0;
  if(n<1024)return n+' o';
  if(n<1024*1024)return (n/1024).toFixed(1)+' Ko';
  return (n/1024/1024).toFixed(2)+' Mo';
}
function fmtLocalDateTime(value){
  if(!value || value==='—')return '—';
  try{
    const d=new Date(value);
    if(isNaN(d.getTime()))return String(value);
    return d.toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'medium'});
  }catch(e){return String(value)}
}
function fmtIsoInfo(value){

function storageSize(key){

function driveEndpointMasked(endpoint){
  if(!endpoint)return 'Non renseigné';
  const s=String(endpoint);

}
function buildSyncDiagnostics(){
  const cfg=getDriveConfig();
  const snaps=getSnapshots();
  const endpointOk=!!cfg.endpoint;
  const enabledOk=!!cfg.enabled;
  const currentLocalSize=storageSize(CURRENT_KEY);
  const activeSize=storageSize(KEY);
  const lastSent=cfg.lastSent||'—';
  const lastSentLocal=fmtLocalDateTime(lastSent);
  const lastMode=cfg.lastMode||'current';
  const selectedProject=selected();
  const hasProjects=Array.isArray(state.projects)&&state.projects.length>0;
  const currentSaved=!!localStorage.getItem(CURRENT_KEY);
  const lastAuto = typeof lastAutoSnapshotLabel==='function' ? lastAutoSnapshotLabel() : '—';
  const endpointDisplay=driveEndpointMasked(cfg.endpoint);
  return {cfg,snaps,endpointOk,enabledOk,currentLocalSize,activeSize,lastSent,lastSentLocal,lastMode,selectedProject,hasProjects,currentSaved,lastAuto,endpointDisplay};
}

let driveDiagnostic=null;
let driveDiagnosticLoading=false;
function getDriveDiagnosticUrl(){
  const cfg=getDriveConfig();
  if(!cfg.endpoint)return '';
  return cfg.endpoint+(cfg.endpoint.includes('?')?'&':'?')+'action=diagnostic';
}
function fetchDriveDiagnostic(){
  const cfg=getDriveConfig();
  if(!cfg.endpoint){toast('Endpoint Drive non configuré');return}
  driveDiagnosticLoading=true;renderAll();
  const cb='biDriveDiag_'+Date.now()+'_'+Math.floor(Math.random()*100000);
  window[cb]=function(data){
    driveDiagnosticLoading=false;driveDiagnostic=data;
    try{delete window[cb]}catch(e){window[cb]=undefined}
    toast(data&&data.ok?'Diagnostic Drive réel reçu':'Diagnostic Drive en erreur');
    renderAll();
  };
  const s=document.createElement('script');
  s.src=getDriveDiagnosticUrl()+'&callback='+cb+'&t='+Date.now();
  s.onerror=function(){driveDiagnosticLoading=false;toast('Erreur lecture diagnostic Drive');try{delete window[cb]}catch(e){window[cb]=undefined}renderAll()};
  document.body.appendChild(s);
  setTimeout(()=>{try{s.remove()}catch(e){}},30000);
}

function driveRealSummary(){

  return {
    available:true,
    current:d.counts?.current||0,
    snapshots:d.counts?.snapshots||0,
    lastCurrent:d.latest?.current?.updated?fmtDriveDate(d.latest.current.updated):'—',
    lastSnapshot:d.latest?.snapshot?.updated?fmtDriveDate(d.latest.snapshot.updated):'—',
    duplicate:!!d.warnings?.duplicateCurrent,
    overRetention:!!d.warnings?.snapshotsOverRetention,
    folderUrl:d.folderUrl||'#',
    folderName:d.folderName||'Drive'
  };
}

    ${s.overRetention?'<div class="drive-alert">⚠ Snapshots Drive au-dessus de la limite.</div>':'<div class="drive-ok">Drive réel cohérent.</div>'}
    <div class="drive-real-inline"><button class="mini-btn" onclick="fetchDriveDiagnostic()">Rafraîchir Drive</button><a class="mini-btn" href="${esc(s.folderUrl)}" target="_blank" rel="noopener">Ouvrir dossier</a></div>
  </div>`;
}

function clampPct(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)))}
function statusScore(status){
  const s=String(status||'').toLowerCase();
  if(s.includes('validé')||s.includes('valide'))return 100;
  if(s.includes('validation'))return 80;
  if(s.includes('cours'))return 50;
  if(s.includes('traiter'))return 20;
  if(s.includes('idée')||s.includes('idee')||s.includes('brouillon'))return 10;
  return 25;
}

function normKey(v){
  return String(v||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function roadStatusScore(status){
  const s=normKey(status);
  if(s.includes('valide') || s.includes('termine') || s.includes('fait') || s.includes('done'))return 1;
  if(s.includes('validation') || s.includes('test') || s.includes('recette'))return .8;
  if(s.includes('cours') || s.includes('progress') || s.includes('traitement'))return .5;
  if(s.includes('bloque'))return .25;
  return 0;
}
function projectRoadBlocks(projectId){
  const p=selected();
  if(!p)return [];
  // Source réelle des blocs roadmap du Cockpit : les blocs sont stockés dans la fiche projet.
  if(Array.isArray(p.roadmapBlocks))return p.roadmapBlocks;
  if(Array.isArray(p.roadmap))return p.roadmap;
  if(Array.isArray(p.roadBlocks))return p.roadBlocks;
  return [];
}
function projectRoadBlocksDiagnostic(p){
  const blocks=p&&Array.isArray(p.roadmapBlocks)?p.roadmapBlocks:
    p&&Array.isArray(p.roadmap)?p.roadmap:
    p&&Array.isArray(p.roadBlocks)?p.roadBlocks:[];
  return {
    source:p&&Array.isArray(p.roadmapBlocks)?'selectedProject.roadmapBlocks':
      p&&Array.isArray(p.roadmap)?'selectedProject.roadmap':
      p&&Array.isArray(p.roadBlocks)?'selectedProject.roadBlocks':'aucune source roadmap projet',
    blocks
  };
}
function roadBlockLinkDebug(p,blocks){
  const d=projectRoadBlocksDiagnostic(p);
  if(blocks.length)return `${blocks.length} blocs roadmap lus depuis ${d.source}`;
  return `0 bloc roadmap lu · source : ${d.source}`;
}
function renderRoadmapScoreDiagnostic(p){
  const d=projectRoadBlocksDiagnostic(p);
  const blocks=d.blocks||[];
  const rows=blocks.slice(0,40).map(b=>{
    return `<div class="road-score-row ok">
      <span class="road-score-badge ok">pris</span>
      <div><b>${esc(b.title||b.name||'Bloc sans titre')}</b><br><small>${esc(b.text||b.description||'')}</small></div>
      <span>${esc(b.status||'—')}</span>
      <span>${Math.round(roadStatusScore(b.status)*100)}%</span>
    </div>`;
  }).join('');
  return `<div class="road-score-source">
    Source roadmap utilisée : <b>${esc(d.source)}</b> · blocs pris en compte : <b>${blocks.length}</b>.
    Le calcul lit maintenant directement la roadmap de la fiche projet sélectionnée.
  </div>
  <div class="road-score-debug-panel">
    <h4>Blocs roadmap pris dans le score</h4>
    <div class="road-score-list">${rows||'<div class="muted">Aucun bloc roadmap dans la fiche projet sélectionnée.</div>'}</div>
  </div>`;
}
function estimateDocumentationScore(p){
  let score=0, detail=[];
  const notes=(state.notes||[]).filter(n=>String(n.projectId||'')===String(p.id)||String(n.project||'')===String(p.id)||String(n.projectName||'')===String(p.name));
  if(notes.length>0){score+=40;detail.push('notes présentes')}
  const hasText=(String(p.desc||p.description||p.notes||'').trim().length>20);
  if(hasText){score+=25;detail.push('description renseignée')}
  const links=ensureProjectLinks(p);
  const hasLinks=links.some(l=>l.url);
  if(hasLinks){score+=35;detail.push(`${links.filter(l=>l.url).length} liens projet renseignés`)}
  return {score:clampPct(score),detail:detail.length?detail.join(' · '):'peu de documentation détectée'};
}
function estimateSyncScore(){
  const cfg=getDriveConfig();
  const s=driveRealSummary ? driveRealSummary() : {available:false};
  let score=0, detail=[];
  if(cfg.endpoint){score+=20;detail.push('endpoint configuré')}
  if(cfg.enabled){score+=15;detail.push('sync activée')}
  if(s.available){
    if(Number(s.current)===1){score+=30;detail.push('CURRENT Drive OK')}
    else if(Number(s.current)>1){score+=10;detail.push('doublon CURRENT')}
    if(Number(s.snapshots)>0){score+=20;detail.push('snapshots Drive présents')}
    if(!s.duplicate&&!s.overRetention){score+=15;detail.push('aucune alerte Drive')}
  }else{
    if((cfg.lastMode||'')==='current'){score+=10;detail.push('dernier mode current local')}
    detail.push('Drive réel non lu');
  }
  return {score:clampPct(score),detail:detail.join(' · ')||'sync non configurée'};
}
function estimateProjectProgress(p){
  if(!p)return null;
  const blocks=projectRoadBlocks(p.id);
  let roadScore=0, roadDetail=roadBlockLinkDebug(p,[]);
  if(blocks.length){
    const total=blocks.reduce((a,b)=>a+roadStatusScore(b.status),0);
    roadScore=clampPct((total/blocks.length)*100);
    const valid=blocks.filter(b=>roadStatusScore(b.status)>=1).length;
    const validation=blocks.filter(b=>String(b.status||'').toLowerCase().includes('validation')).length;
    roadDetail=`${blocks.length} blocs projet · ${valid} validés · ${validation} en validation`;
  }
  const statScore=clampPct(statusScore(p.status));
  const sync=estimateSyncScore();
  const doc=estimateDocumentationScore(p);
  const final=clampPct(roadScore*.40 + statScore*.25 + sync.score*.20 + doc.score*.15);
  const manual=Number(p.progress||p.avancement||0);
  return {
    final, manual:clampPct(manual),
    road:{score:roadScore,weight:40,detail:roadDetail},
    status:{score:statScore,weight:25,detail:p.status||'statut inconnu'},
    sync:{score:sync.score,weight:20,detail:sync.detail},
    doc:{score:doc.score,weight:15,detail:doc.detail}
  };
}

function initRightDragDrop(){
  const rail=document.querySelector('.right-rail');
  if(!rail)return;
  let sourceId=null;
  rail.querySelectorAll('.drag-grip[data-drag-id]').forEach(handle=>{
    handle.addEventListener('dragstart',ev=>{
      sourceId=handle.dataset.dragId;
      const card=handle.closest('[data-right-block]');
      card?.classList.add('dragging');
      ev.dataTransfer.effectAllowed='move';
      ev.dataTransfer.setData('text/plain',sourceId);
    });
    handle.addEventListener('dragend',()=>{
      rail.querySelectorAll('.dragging,.drop-before,.drop-after').forEach(x=>x.classList.remove('dragging','drop-before','drop-after'));
    });
  });
  rail.querySelectorAll('[data-right-block]').forEach(card=>{
    card.addEventListener('dragover',ev=>{
      ev.preventDefault();
      const rect=card.getBoundingClientRect();
      card.classList.toggle('drop-before', ev.clientY < rect.top + rect.height/2);
      card.classList.toggle('drop-after', ev.clientY >= rect.top + rect.height/2);
    });
    card.addEventListener('dragleave',()=>card.classList.remove('drop-before','drop-after'));
    card.addEventListener('drop',ev=>{
      ev.preventDefault();
      const targetId=card.dataset.rightBlock;
      const source=sourceId||ev.dataTransfer.getData('text/plain');
      const after=card.classList.contains('drop-after');
      rail.querySelectorAll('.drop-before,.drop-after,.dragging').forEach(x=>x.classList.remove('drop-before','drop-after','dragging'));
      if(!source||!targetId||source===targetId)return;
      const order=getRightOrder().filter(x=>x!==source);
      let idx=order.indexOf(targetId);
      if(after)idx++;
      order.splice(idx,0,source);
      setRightOrder(order);
      renderAll();
    });
  });
}

function defaultLinkVisual(type){
  const map={
    'Drive':'🟢','GitHub':'⚫','BI publié':'🧭','Apps Script':'△','ChatGPT':'🤖',
    'Documentation':'📄','Maquette':'🎨','Données':'🗄️','Autre':'🔗'
  };
  return map[type]||'🔗';
}

function ensureProjectLinks(p){
  if(!p.links || !Array.isArray(p.links))p.links=[];
  const seeds=[
    ['Drive',p.driveUrl||p.drive||'','Dossier Google Drive du projet'],
    ['GitHub',p.githubUrl||p.github||'','Repository ou dossier GitHub'],
    ['BI publié',p.publishedUrl||p.url||p.biUrl||'','URL GitHub Pages / version publiée'],
    ['Apps Script',p.appsScriptUrl||p.scriptUrl||'','Endpoint ou projet Apps Script'],
    ['ChatGPT',p.gptUrl||p.chatgptUrl||'','Projet ChatGPT lié']
  ];
  seeds.forEach(([type,url,note])=>{
    if(url && !p.links.some(l=>String(l.url||'')===String(url))){
      p.links.push({
        id:uid(),type,title:type,url,note,
        icon:defaultLinkVisual(type),logoUrl:'',logoDataUrl:'',
        created:nowFr(),updated:nowFr()
      });
    }
  });
  p.links.forEach(l=>{
    if(l.icon===undefined || l.icon===null || l.icon==='') l.icon=defaultLinkVisual(l.type||'Autre');
    if(l.logoUrl===undefined) l.logoUrl='';
    if(l.logoDataUrl===undefined) l.logoDataUrl='';
    if(l.buttonText===undefined) l.buttonText='';
  });
  if(!selectedLinkId && p.links[0]) selectedLinkId=p.links[0].id;
  return p.links;
}
function getLinkLogoSrc(l){
  const data=String(l.logoDataUrl||'').trim();
  if(data) return data;
  const logo=String(l.logoUrl||'').trim();
  if(logo) return safeUrl(logo);
  return '';
}
function linkVisualMarkup(l, cls=''){
  const logoSrc = getLinkLogoSrc(l);
  const icon = String(l.icon||defaultLinkVisual(l.type||'Autre')).trim();
  return `<div class="${cls}">${logoSrc?`<img src="${esc(logoSrc)}" alt="">`:`<span class="txt">${esc(icon||'🔗')}</span>`}</div>`;
}
function getSelectedProjectLink(p){

function duplicateProjectLink(id){
  const p=selected(); if(!p)return;
  const links=ensureProjectLinks(p);
  const src=links.find(x=>String(x.id)===String(id));
  if(!src)return;
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=uid(); copy.title=(src.title||'Lien')+' copie'; copy.created=nowFr(); copy.updated=nowFr();
  const pos=links.findIndex(x=>String(x.id)===String(id));
  links.splice(pos+1,0,copy);
  selectedLinkId=copy.id;
  persist('lien projet dupliqué');

function updateProjectLink(id,field,value){
  const p=selected(); if(!p)return;
  const links=ensureProjectLinks(p);
  const l=links.find(x=>String(x.id)===String(id));

  const oldType=l.type;
  l[field]=value;
  if(field==='type' && (!l.icon || l.icon===defaultLinkVisual(oldType||''))) l.icon=defaultLinkVisual(value);
  l.updated=nowFr();
  persist('lien projet modifié');
}

function importProjectLinkLogoFile(input,id){
  const file=input?.files?.[0];
  if(!file) return;
  if(!file.type || !file.type.startsWith('image/')){toast('Choisis une image'); return;}
  const reader=new FileReader();
  reader.onload=()=>{ setProjectLinkLogoData(id, String(reader.result||'')); toast('Logo importé'); };
  reader.readAsDataURL(file);
}
function handleProjectLinkLogoPaste(event,id){
  const items = event.clipboardData?.items || [];
  for(const item of items){
    if(item.type && item.type.startsWith('image/')){
      event.preventDefault();
      const file=item.getAsFile();
      if(!file) return;
      const reader=new FileReader();
      reader.onload=()=>{ setProjectLinkLogoData(id, String(reader.result||'')); toast('Logo collé'); };
      reader.readAsDataURL(file);
      return;
    }
  }
  toast('Aucune image détectée dans le collage');
}

function statusIcon(status){
  const s=String(status||'').toLowerCase();
  if(s.includes('valid'))return '✅';
  if(s.includes('cours')||s.includes('déploy'))return '🟢';
  if(s.includes('traiter'))return '🟡';
  if(s.includes('bloq'))return '🔴';
  return '⚪';
}
function getProjectVersions(p){
  const versions=[];
  (p.versions||[]).forEach(v=>versions.push({title:v.title||v.version||'Version',date:v.date||v.created||'',text:v.text||v.note||v.description||''}));
  (p.notes||[]).filter(n=>/v\d|version|déploiement|deploy/i.test((n.title||'')+' '+(n.text||''))).forEach(n=>versions.push({title:n.title||'Note version',date:n.date||n.created||'',text:n.text||''}));
  (p.roadmapBlocks||[]).filter(b=>/déploiement|deploy|version|v6|v\d/i.test((b.title||'')+' '+(b.text||''))).forEach(b=>versions.push({title:b.title||'Bloc version',date:b.updated||b.created||'',text:b.text||b.status||''}));
  versions.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  return versions.slice(0,30);
}

function githubRepoSlugFromProject(p){
  const links=ensureProjectLinks(p);
  const gh=(links.find(l=>String(l.type||'')==='GitHub' && l.url)?.url) || p.githubUrl || p.sources?.githubRepo || '';
  const s=String(gh||'').trim();
  if(!s)return '';
  let m=s.match(/github\.com\/([^\/\s]+)\/([^\/\s#?]+)/i);
  if(m)return `${m[1]}/${m[2].replace(/\.git$/,'')}`;
  m=s.match(/^([^\/\s]+)\/([^\/\s]+)$/);
  if(m)return `${m[1]}/${m[2].replace(/\.git$/,'')}`;
  return '';
}
async function fetchGitHubVersionHistory(){
  const p=selected();
  const slug=githubRepoSlugFromProject(p);
  if(!slug){toast('Lien GitHub non renseigné');return}
  externalVersionHistory.status='Lecture GitHub...';
  renderAll();
  try{
    const path=p.sources?.githubPath||'';
    const url=`https://api.github.com/repos/${slug}/commits?per_page=30${path?`&path=${encodeURIComponent(path)}`:''}`;
    const res=await fetch(url,{headers:{'Accept':'application/vnd.github+json'}});
    if(!res.ok)throw new Error('GitHub '+res.status);
    const data=await res.json();
    externalVersionHistory.github=(Array.isArray(data)?data:[]).map(c=>({
      sha:String(c.sha||'').slice(0,7),
      title:c.commit?.message?.split('\n')[0]||'Commit',
      text:c.commit?.message||'',
      date:c.commit?.committer?.date||c.commit?.author?.date||'',
      author:c.commit?.author?.name||'',
      url:c.html_url||''
    }));
    externalVersionHistory.status=`GitHub OK · ${externalVersionHistory.github.length} commit(s)`;
    externalVersionHistory.updated=nowFr();
    toast('Historique GitHub chargé');
    renderAll();
  }catch(e){
    externalVersionHistory.status='Erreur GitHub : '+e.message;
    toast('Erreur GitHub');
    renderAll();
  }
}
function loadDriveVersionHistoryFromDiagnostic(){
  const d=driveDiagnostic||null;
  if(!d){toast('Lance d’abord “Lire Drive réel” dans Données / sync'); return}
  const files=d.files||d.latestFiles||[];
  externalVersionHistory.drive=files.map(f=>({
    title:f.name||f.filename||'Fichier Drive',
    date:f.modifiedTime||f.updated||f.date||'',
    text:[f.mimeType,f.size?`${f.size} octets`:'',f.url||f.webViewLink||''].filter(Boolean).join(' · '),
    url:f.url||f.webViewLink||''
  }));
  externalVersionHistory.status=`Drive diagnostic OK · ${externalVersionHistory.drive.length} fichier(s)`;
  externalVersionHistory.updated=nowFr();
  toast('Historique Drive repris du diagnostic');
  renderAll();
}

      <button class="mini-btn" onclick="loadDriveVersionHistoryFromDiagnostic()">🟢 Reprendre Drive diagnostic</button>
      <button class="mini-btn" onclick="activeMain='data';renderAll()">Ouvrir Données / sync</button>
    </div>
    <p class="muted">GitHub fonctionne si le repo est public. Drive passe par le diagnostic Apps Script déjà en place, car un HTML statique ne peut pas lire librement un Drive privé.</p>
    <h3>GitHub commits</h3>
    ${gh.map(c=>`<div class="external-version-row"><span class="version-source-chip">GitHub ${esc(c.sha)}</span><div><b>${esc(c.title)}</b><br><small>${esc((c.text||'').slice(0,220))}</small></div><div><small>${esc(c.date?c.date.slice(0,16).replace('T',' '):'')}</small><br>${c.url?`<a class="link-mini" href="${esc(c.url)}" target="_blank" rel="noopener">ouvrir</a>`:''}</div></div>`).join('')||'<p class="muted">Aucun commit GitHub chargé.</p>'}
    <h3 style="margin-top:12px">Drive fichiers / snapshots</h3>
    ${dr.map(f=>`<div class="external-version-row"><span class="version-source-chip">Drive</span><div><b>${esc(f.title)}</b><br><small>${esc((f.text||'').slice(0,220))}</small></div><div><small>${esc(f.date?String(f.date).slice(0,16).replace('T',' '):'')}</small>${f.url?`<br><a class="link-mini" href="${esc(f.url)}" target="_blank" rel="noopener">ouvrir</a>`:''}</div></div>`).join('')||'<p class="muted">Aucun fichier Drive repris. Lance “Lire Drive réel”, puis reviens ici.</p>'}
  </section>`;
}
function renderVersionsTimeline(){
  const p=selected();
  const versions=getProjectVersions(p);
  const road=p.roadmapBlocks||[];
  return `<div class="view-title"><h2>🕒 Versions / frise</h2><span class="pill">${versions.length} local · ${(externalVersionHistory.github||[]).length} GitHub · ${(externalVersionHistory.drive||[]).length} Drive</span></div>
  <section class="summary-wide">
    <div class="summary-panel">
      <h3>Frise versions locales</h3>
      <p class="muted">Versions détectées dans les notes et blocs du projet. Pour l’historique complet, interroge GitHub ou Drive ci-dessous.</p>
      <div class="timeline-version">
        ${versions.map(v=>`<div class="version-node"><h4>${esc(v.title)}</h4><p><b>${esc(v.date||'date non renseignée')}</b><br>${esc((v.text||'').slice(0,260))}</p></div>`).join('')||'<p class="muted">Aucune version locale détectée dans les notes ou blocs.</p>'}
      </div>
    </div>
    <div class="summary-panel">
      <h3>Frise des blocs roadmap</h3>
      <div class="timeline-version">
        ${road.map(b=>`<div class="version-node"><h4>${esc(b.title||'Bloc')}</h4><p><b>${esc(b.status||'—')}</b> · ${esc(b.updated||b.created||'')}<br>${esc((b.text||'').slice(0,220))}</p></div>`).join('')||'<p class="muted">Aucun bloc roadmap.</p>'}
      </div>
    </div>
  </section>
  ${renderExternalVersionHistory()}`;
}
function workTimeSettings(){
  try{return Object.assign({minutesPerVersion:35,minutesPerBlock:20,minutesPerNote:8,minutesPerSnapshot:4},JSON.parse(localStorage.getItem('bi_central_worktime_settings')||'{}'))}catch(e){return {minutesPerVersion:35,minutesPerBlock:20,minutesPerNote:8,minutesPerSnapshot:4}}
}
function setWorkTimeSetting(k,v){const s=workTimeSettings();s[k]=Number(v)||0;localStorage.setItem('bi_central_worktime_settings',JSON.stringify(s));renderAll()}
function renderWorkTimeCalculator(){
  const p=selected(), s=workTimeSettings();
  const versions=getProjectVersions(p).length;
  const blocks=(p.roadmapBlocks||[]).length;
  const notes=(p.notes||[]).length;
  const snaps=getSnapshots().length;
  const minutes=versions*s.minutesPerVersion + blocks*s.minutesPerBlock + notes*s.minutesPerNote + snaps*s.minutesPerSnapshot;
  const hours=(minutes/60).toFixed(1);
  return `<div class="view-title"><h2>⏱ Temps BI</h2><span class="pill orange">estimation</span></div>
  <section class="summary-panel">
    <h3>Calculateur temps de travail estimé</h3>
    <p class="muted">Ce calcul donne un ordre de grandeur à partir de l’historique interne : versions détectées, blocs roadmap, notes et snapshots locaux. Ce n’est pas un chronomètre réel.</p>
    <div class="worktime-grid">
      <div class="worktime-card"><small>Versions détectées</small><b>${versions}</b><small>${s.minutesPerVersion} min / version</small></div>
      <div class="worktime-card"><small>Blocs roadmap</small><b>${blocks}</b><small>${s.minutesPerBlock} min / bloc</small></div>
      <div class="worktime-card"><small>Notes projet</small><b>${notes}</b><small>${s.minutesPerNote} min / note</small></div>
      <div class="worktime-card"><small>Snapshots locaux</small><b>${snaps}</b><small>${s.minutesPerSnapshot} min / snapshot</small></div>
    </div>
    <div class="summary-card" style="margin-bottom:12px"><small>Total estimé</small><b>${hours} h</b><small>${minutes} minutes estimées</small></div>
    <h3>Paramètres de calcul</h3>
    <div class="worktime-settings">
      <div><label>Min / version</label><input type="number" value="${s.minutesPerVersion}" onchange="setWorkTimeSetting('minutesPerVersion',this.value)"></div>
      <div><label>Min / bloc</label><input type="number" value="${s.minutesPerBlock}" onchange="setWorkTimeSetting('minutesPerBlock',this.value)"></div>
      <div><label>Min / note</label><input type="number" value="${s.minutesPerNote}" onchange="setWorkTimeSetting('minutesPerNote',this.value)"></div>
      <div><label>Min / snapshot</label><input type="number" value="${s.minutesPerSnapshot}" onchange="setWorkTimeSetting('minutesPerSnapshot',this.value)"></div>
    </div>
    <div class="worktime-note"><b>Piste future :</b> ajouter un vrai journal d’activité : ouverture BI, sauvegarde, création bloc, validation, publication GitHub, snapshot Drive. Cela permettrait de passer d’une estimation à une mesure semi-réelle.</div>
  </section>`;
}
function renderMainView(){
  const p=selected(), total=state.projects.length, active=state.projects.filter(p=>['En cours','Déployé','Validé','À tester'].includes(p.status)).length, avg=Math.round(state.projects.reduce((a,p)=>a+projectReadiness(p),0)/Math.max(1,total));
  let html='';
  if(activeMain==='fiche'){html=''}
  else if(activeMain==='progress'){html=renderProgressTab()}
  else if(activeMain==='versionsTimeline'){html=renderVersionsTimeline()}
  else if(activeMain==='worktime'){html=renderWorkTimeCalculator()}
  else if(activeMain==='dashboard'){html=`<div class="view-title"><h2>📊 Dashboard</h2><span class="pill">${active}/${total} actifs</span></div>${renderPilotageBoard()}<div class="subcard" style="min-height:auto"><h3>Portefeuille</h3><p class="muted">Maturité moyenne ${avg}% · Drive Sync ${getDriveConfig().enabled?'connecté':'à configurer'} · snapshots ${getSnapshots().length}.</p></div>${renderDriveDashboardCards()}`}
  else if(activeMain==='active'){html=`<div class="view-title"><h2>🟢 Mode actif</h2><span class="pill green">${esc(p.status)}</span></div>${renderPilotageBoard()}<div class="subcard" style="min-height:auto"><p>Dernière reprise : <b>${esc(recoveryMeta.source)}</b>. Drive Sync : <b>${esc(getDriveConfig().lastStatus)}</b>.</p><button class="mini-btn" onclick="sendDriveSync('manuel courant',false,'current')">☁ Envoyer maintenant</button><button class="mini-btn" onclick="exportManifest()">▤ Manifest global</button></div>`}
  else if(activeMain==='roadmap'){html=renderRoadmapPilotable()}
  else if(activeMain==='deploy'){html=`<div class="view-title"><h2>🚀 Déploiement</h2><span class="pill green">GitHub Pages</span></div>${renderPilotageBoard()}<div class="subcard" style="min-height:auto"><p>Publication manuelle conservée : remplacer <b>apps/gestion-projets-bi/index.html</b>.</p><p><a href="${PUBLIC_ROOT}gestion-projets-bi/" target="_blank">Ouvrir la version publiée</a></p></div>`}
  else if(activeMain==='notes'){html=renderNotesModule()}
  else if(activeMain==='data'){html=renderRealSyncDashboard()}
else if(activeMain==='sources'){html=renderLinksWorkspace()}
  $('mainView').innerHTML=html
}
function renderSidebar(){
  const el=$('rightSidebar');
  el.classList.add('right-rail');
  el.innerHTML=renderRightToolbarAndModules();
  setTimeout(initRightDragDrop,0);
}
function saveCahier(){
  const p=selected(); const txt=$('cahierText')?.value||'';
  p.notes=p.notes||[];
  if(p.notes[0]&&p.notes[0].title==='Cahier de projet'){p.notes[0].text=txt;p.notes[0].date=nowFr()}
  else p.notes.unshift({title:'Cahier de projet',date:nowFr(),text:txt});
  persist('cahier de projet'); toast('Cahier sauvegardé'); renderAll();
}
function spark(color){return `<div class="spark"><svg viewBox="0 0 120 42"><path d="M2 34 L14 26 L25 30 L37 20 L48 25 L61 12 L72 18 L84 9 L96 14 L118 3" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round"/><path d="M2 34 L14 26 L25 30 L37 20 L48 25 L61 12 L72 18 L84 9 L96 14 L118 3" fill="none" stroke="${color}" stroke-width="8" opacity=".12" stroke-linecap="round"/></svg></div>`}
function renderKpis(){const total=state.projects.length, active=state.projects.filter(p=>['En cours','Déployé','Validé','À tester'].includes(p.status)).length, snaps=getSnapshots().length, cfg=getDriveConfig();$('kpis').innerHTML=`<div class="kpi"><div class="kpi-ico">👥</div><div><h3>Projets actifs</h3><b>${active} / ${total}</b><small>${Math.round(active/Math.max(1,total)*100)}% des projets en cours</small></div>${spark('#28eaff')}</div><div class="kpi"><div class="kpi-ico">📷</div><div><h3>Snapshots</h3><b>${snaps}</b><small>Dernier: ${esc(getSnapshots()[0]?.date?.slice(0,16).replace('T',' ')||'—')}</small></div>${spark('#b45dff')}</div><div class="kpi"><div class="kpi-ico">△</div><div><h3>Drive connecté</h3><b>${cfg.enabled?'OK':'—'}</b><small>${esc(cfg.lastStatus)}</small></div>${spark('#35f384')}</div><div class="kpi"><div class="kpi-ico">◉</div><div><h3>GitHub Pages</h3><b>En ligne</b><small>Dernière mise à jour: ${today()}</small></div>${spark('#197bff')}</div>`}
function addNote(){const p=selected();const title=prompt('Titre de la note','Nouvelle note');if(!title)return;const text=prompt('Texte de la note','');p.notes=p.notes||[];p.notes.unshift({title,date:nowFr(),text:text||''});persist('note ajoutée');renderAll()}
function openModal(){$('projectModal').classList.add('show')} function closeModal(){$('projectModal').classList.remove('show')}
function createProject(){const name=$('mName').value.trim();if(!name){toast('Nom obligatoire');return}const p={id:uid(),name,space:$('mSpace').value,icon:$('mIcon').value.trim()||'🧩',type:$('mType').value,client:$('mClient').value.trim(),phase:$('mPhase').value,status:$('mStatus').value,progress:Math.max(0,Math.min(100,+$('mProgress').value||0)),priority:'Moyenne',due:$('mDue').value,goal:$('mGoal').value.trim(),nextAction:$('mNext').value.trim(),stack:'HTML autonome, JSON',tags:[],options:baseOptions(),blockers:[],links:[],sources:baseSources({githubStatus:'Non relié',lastCompletedStep:'Projet créé dans le cockpit',lastStepDate:today(),nextMilestone:'Définir dossier Drive et fichier maître'}),versions:[{name:'V0',type:'Création',date:today(),text:'Projet créé dans le cockpit.'}],notes:[]};state.projects.unshift(p);state.selectedId=p.id;activeSpace=p.space;closeModal();persist('création projet');toast('Projet créé');renderAll()}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),2300)}

function isFormLike(el){
  return el && ['INPUT','TEXTAREA','SELECT'].includes(el.tagName);
}
function captureUiDrafts(){
  try{
    uiDrafts={};
    document.querySelectorAll('input[id],textarea[id],select[id]').forEach(el=>{
      uiDrafts[el.id]=el.value;
    });
    const a=document.activeElement;
    if(isFormLike(a) && a.id){
      uiRestoreFocus={id:a.id,start:a.selectionStart||0,end:a.selectionEnd||0};
    }else{
      uiRestoreFocus=null;
    }
  }catch(e){}
}
function restoreUiDrafts(){
  try{
    Object.entries(uiDrafts||{}).forEach(([id,val])=>{
      const el=document.getElementById(id);
      if(el && el.value!==val)el.value=val;
    });
    if(uiRestoreFocus && uiRestoreFocus.id){
      const el=document.getElementById(uiRestoreFocus.id);
      if(el){
        el.focus({preventScroll:true});
        if(typeof el.setSelectionRange==='function'){
          const len=String(el.value||'').length;
          const s=Math.min(uiRestoreFocus.start,len), e=Math.min(uiRestoreFocus.end,len);
          el.setSelectionRange(s,e);
        }
      }
    }
  }catch(e){}
}
function safeRenderAll(){
  captureUiDrafts();
  renderAll();
  setTimeout(restoreUiDrafts,0);
}
function scheduleSoftRender(){
  if(isFormLike(document.activeElement)){
    captureUiDrafts();
    setTimeout(()=>{ if(!isFormLike(document.activeElement)) renderAll(); },250);
  }else{
    renderAll();
  }
}
function renderAll(){renderQuickLinks();renderCentralTabs();renderList();renderDetail();renderMainView();renderSidebar();renderKpis();
  setTimeout(initRightDragDrop,0);
}
document.addEventListener('DOMContentLoaded',()=>{initSelect('phaseFilter',PHASES,true);initSelect('statusFilter',STATUSES,true);initSelect('mSpace',SPACES.filter(x=>x!=='Tous'));initSelect('mType',TYPES);initSelect('mPhase',PHASES);initSelect('mStatus',STATUSES);$('search').oninput=renderList;$('phaseFilter').onchange=renderList;$('statusFilter').onchange=renderList;$('newBtn').onclick=openModal;$('newBtn2').onclick=openModal;$('closeModal').onclick=closeModal;$('projectModal').onclick=e=>{if(e.target===$('projectModal'))closeModal()};$('createBtn').onclick=createProject;$('exportBtn').onclick=exportJson;$('snapshotBtn').onclick=exportSnapshot;$('manifestBtn').onclick=exportManifest;$('driveSyncBtn').onclick=configureDriveSync;$('importFile').onchange=e=>{if(e.target.files[0])importJson(e.target.files[0]);e.target.value=''};$('resetBtn').onclick=resetDemo;renderAll();if(!localStorage.getItem(KEY)||recoveryMeta.source!==KEY){persist('reprise automatique depuis '+recoveryMeta.source);toast('Reprise automatique active')}});

document.addEventListener('input',function(ev){
  if(isFormLike(ev.target) && ev.target.id){
    uiDrafts[ev.target.id]=ev.target.value;
  }
},true);
document.addEventListener('click',function(ev){
  if(isFormLike(ev.target)){
    suppressRoadScroll=true;
    setTimeout(()=>suppressRoadScroll=false,250);
  }
},true);

</script>
