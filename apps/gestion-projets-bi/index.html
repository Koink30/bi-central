  const notes=(p.notes||[]).filter(n=>!n.roadmapId);
  if(!notes.length){toast('Aucune note non liée');return}
  notes.forEach(n=>{
    const block={id:uid(),title:n.title||n.type||'Note',type:n.type||'Note',status:n.status&&ROAD_STATUSES.includes(n.status)?n.status:'À traiter',priority:n.type==='Bug'||n.type==='Problème'?'Haute':'Moyenne',text:n.text||'',created:nowFr()};
    p.roadmapBlocks.unshift(block);n.roadmapId=block.id;n.updated=nowFr();
  });
  persist('notes converties en roadmap');toast('Notes converties et liées');activeMain='roadmap';renderAll();
}
function renderNoteItem(n,i){
  const typ=String(n.type||'Commentaire').toLowerCase();
  return `<div class="note-item ${n.selected?'selected':''}">
    <input type="checkbox" ${n.selected?'checked':''} onchange="toggleNoteBasket(${i},this.checked)">
    <div><span class="note-type ${typ}">${esc(n.type||'Commentaire')}</span> <b>${esc(n.title||'Sans titre')}</b><br><small class="muted">${esc(n.date||'')}</small><p style="margin:7px 0 0;color:#d8edfb">${esc(n.text||'')}</p></div>
    <button class="icon-btn" onclick="deleteNote(${i})">×</button>
  </div>`
}
function buildPromptBasket(p){
  const selected=(p.notes||[]).filter(n=>n.selected);
  if(!selected.length)return 'Aucune note sélectionnée. Coche des notes dans la liste pour construire le prompt.';
  return `Contexte : nous travaillons sur le BI "${p.name}" (${VERSION}).\nObjectif : analyser les notes sélectionnées et proposer des corrections concrètes / priorisées.\n\nNotes sélectionnées :\n`+
    selected.map((n,i)=>{const rb=(p.roadmapBlocks||[]).find(b=>b.id===n.roadmapId);return `\n${i+1}. [${n.type||'Note'} · ${n.status||'À traiter'}] ${n.title||'Sans titre'}\nLien roadmap : ${rb?rb.status+' · '+rb.title:'sans lien'}\nDate : ${n.date||''}\nDétail : ${n.text||''}`}).join('\n')+
    `\n\nRéponse attendue : synthèse, priorités, proposition de modification du BI, points à vérifier avant publication.`;
}
function addStructuredNote(){
  const p=selected(); p.notes=p.notes||[]; ensureRoadmap(p);
  const type=$('noteType').value, title=$('noteTitle').value.trim()||type+' sans titre', text=$('noteText').value.trim();
  const status=$('noteStatus')?.value||'À traiter', roadmapId=$('noteRoadmapId')?.value||'';
  p.notes.unshift({type,title,text,status,roadmapId,date:nowFr(),selected:false});
  persist('note structurée ajoutée');toast('Note ajoutée');renderAll();
}
function toggleNoteBasket(i,val){const p=selected();if(p.notes&&p.notes[i]){p.notes[i].selected=val;persist('panier notes');renderAll()}}
function deleteNote(i){const p=selected();if(!p.notes||!p.notes[i])return;if(!confirm('Supprimer cette note ?'))return;p.notes.splice(i,1);persist('suppression note');renderAll()}
function selectAllNotes(val){const p=selected();(p.notes||[]).forEach(n=>n.selected=val);persist('panier notes');renderAll()}
async function copyPromptBasket(){const txt=buildPromptBasket(selected());try{await navigator.clipboard.writeText(txt);toast('Prompt copié')}catch(e){toast('Copie impossible, sélectionne le texte')}}
function downloadPromptBasket(){const blob=new Blob([buildPromptBasket(selected())],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='PROMPT_'+selected().name.replace(/[^a-z0-9]+/gi,'_')+'_'+today()+'.txt';a.click();URL.revokeObjectURL(url)}

const ROAD_STATUSES=['À traiter','En cours','Validation','Validé'];
const ROAD_PRIOS=['Haute','Moyenne','Basse'];
function ensureRoadmap(p){
  if(!Array.isArray(p.roadmapBlocks)||!p.roadmapBlocks.length){
    p.roadmapBlocks=[
      {id:uid(),title:'Clarifier la prochaine action',type:'Action',status:'À traiter',priority:p.priority||'Haute',text:p.nextAction||'Définir le prochain traitement utile pour ce projet.',created:nowFr()},
      {id:uid(),title:'Contrôler les sources',type:'Contrôle',status:'En cours',priority:'Moyenne',text:'Vérifier Drive, GitHub, snapshots et liens réels du projet.',created:nowFr()},
      {id:uid(),title:'Validation usage réel',type:'Validation',status:'Validation',priority:'Haute',text:'Tester le BI en conditions réelles avant publication ou archivage.',created:nowFr()},
      {id:uid(),title:'Publier / archiver',type:'Déploiement',status:'Validé',priority:'Basse',text:'Conserver une trace de la version publiée et des exports JSON.',created:nowFr()}
    ];
  }
}

function roadStatusKey(s){
  return String(s||'À traiter').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');
}
function roadStatusRank(s){
  const order={'À traiter':1,'En cours':2,'Validation':3,'Validé':4};
  return order[s]||9;
}
function sortedRoadBlocks(blocks){
  return [...(blocks||[])].sort((a,b)=>{
    const r=roadStatusRank(a.status)-roadStatusRank(b.status);
    if(r!==0)return r;
    const p={'Haute':1,'Moyenne':2,'Basse':3};
    return (p[a.priority]||9)-(p[b.priority]||9);
  });
}
function filteredRoadBlocks(blocks){
  let out=sortedRoadBlocks(blocks);
  if(roadmapFilter==='actifs')out=out.filter(b=>b.status!=='Validé');
  else if(roadmapFilter!=='tous')out=out.filter(b=>b.status===roadmapFilter);
  return out;
}
function setRoadmapFilter(f){roadmapFilter=f;roadmapShowAll=false;renderAll()}
function toggleRoadmapShowAll(){roadmapShowAll=!roadmapShowAll;renderAll()}
function renderRoadFilterBar(blocks){
  const c=s=>blocks.filter(b=>s==='tous'?true:s==='actifs'?b.status!=='Validé':b.status===s).length;
  const buttons=[
    ['actifs','Actifs',c('actifs')],
    ['À traiter','À traiter',c('À traiter')],
    ['En cours','En cours',c('En cours')],
    ['Validation','Validation',c('Validation')],
    ['Validé','Validés',c('Validé')],
    ['tous','Tous',c('tous')]
  ];
  return `<div class="road-filterbar">
    <div class="road-filter-left">${buttons.map(([key,label,count])=>`<button class="road-filter-btn ${roadmapFilter===key?'active':''}" onclick="setRoadmapFilter('${esc(key)}')">${esc(label)} · ${count}</button>`).join('')}</div>
    <div class="road-filter-right"><span class="road-main-note">Cadres actifs lisibles en haut</span></div>
  </div>`
}
function renderRoadStrip(blocks){
  const active = sortedRoadBlocks(blocks).filter(b=>b.status!=='Validé');
  const validated = sortedRoadBlocks(blocks).filter(b=>b.status==='Validé');
  let visible;
  if(roadmapFilter==='actifs') visible = active;
  else if(roadmapFilter==='tous') visible = sortedRoadBlocks(blocks);
  else visible = sortedRoadBlocks(blocks).filter(b=>b.status===roadmapFilter);
  if(!roadmapShowAll && visible.length>6) visible = visible.slice(0,6);
  const title = roadmapFilter==='actifs' ? 'Objets actifs à piloter' : roadmapFilter==='tous' ? 'Tous les objets roadmap' : 'Objets · '+roadmapFilter;
  return `<section class="road-object-zone">
    <div class="road-object-head">
      <div><h3>${esc(title)}</h3><p class="road-main-note">${roadmapFilter==='actifs'?'Affichage clair des blocs non validés. Les validés restent séparés en bas.':'Blocs triés par statut, validés en fin.'}</p></div>
      <div class="road-filter-right"><button class="road-filter-btn primary ${roadmapShowAll?'active':''}" onclick="toggleRoadmapShowAll()">${roadmapShowAll?'Revenir aux principaux':'Tout afficher'}</button></div>
    </div>
    <div class="road-object-grid">
      ${visible.map(renderRoadTopCard).join('') || '<div class="road-object-empty">Aucun bloc pour ce filtre.</div>'}
    </div>
    ${roadmapFilter==='actifs' && validated.length ? `<div><p class="road-main-note">Validés en fin · ${validated.length}</p><div class="road-validated-strip">${validated.slice(0,roadmapShowAll?validated.length:4).map(b=>`<div class="road-validated-mini" onclick="selectRoadBlock('${esc(b.id)}')">✓ ${esc(b.title||'Bloc validé')}</div>`).join('')}</div></div>` : ''}
  </section>`
}

let draggedRoadId='';
function dragRoadBlock(ev,id){draggedRoadId=id;ev.currentTarget.classList.add('dragging');try{ev.dataTransfer.setData('text/plain',id)}catch(e){}}
function dropRoadBlock(ev,status){ev.preventDefault();const id=draggedRoadId||ev.dataTransfer.getData('text/plain');if(!id)return;setRoadStatus(id,status)}
function findRoadBlock(id){const p=selected();ensureRoadmap(p);return (p.roadmapBlocks||[]).find(b=>b.id===id)}
function setRoadStatus(id,status){const b=findRoadBlock(id);if(!b)return;const beforeStatus=b.status;b.status=status;b.updated=nowFr();persist('roadmap statut');if(status!==beforeStatus)autoSnapshotStatusTransition('bloc roadmap',b.title,status);renderAll()}
function moveRoadBlock(id,dir){const b=findRoadBlock(id);if(!b)return;const beforeStatus=b.status;let i=ROAD_STATUSES.indexOf(b.status);i=Math.max(0,Math.min(ROAD_STATUSES.length-1,i+dir));b.status=ROAD_STATUSES[i];b.updated=nowFr();persist('roadmap déplacement');if(b.status!==beforeStatus)autoSnapshotStatusTransition('bloc roadmap',b.title,b.status);renderAll()}
function addRoadBlockFromForm(){

function editRoadBlock(id){

  b.title=title.trim()||b.title;b.text=text;b.priority=ROAD_PRIOS.includes(prio)?prio:b.priority;b.updated=nowFr();

async function exportRoadmapPrompt(){

  try{await navigator.clipboard.writeText(txt);toast('Prompt roadmap copié')}catch(e){const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='PROMPT_ROADMAP_'+selected().name.replace(/[^a-z0-9]+/gi,'_')+'_'+today()+'.txt';a.click();URL.revokeObjectURL(url);toast('Prompt téléchargé')}

function bytesLabel(n){
  n=Number(n)||0;
  if(n<1024)return n+' o';
  if(n<1024*1024)return (n/1024).toFixed(1)+' Ko';
  return (n/1024/1024).toFixed(2)+' Mo';
}
function fmtLocalDateTime(value){
  if(!value || value==='—')return '—';
  try{
    const d=new Date(value);
    if(isNaN(d.getTime()))return String(value);
    return d.toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'medium'});
  }catch(e){return String(value)}
}
function fmtIsoInfo(value){
  if(!value || value==='—')return '—';
  return esc(String(value))+'<div class="sync-mini-note">Heure affichée convertie en heure locale navigateur. Drive peut afficher sa propre heure locale/modification serveur.</div>';
}

function storageSize(key){
  try{return (localStorage.getItem(key)||'').length}catch(e){return 0}
}
function boolStatus(ok,labelOk,labelBad){
  return `<span class="sync-status ${ok?'ok':'warn'}">${ok?'●':'●'} ${esc(ok?labelOk:labelBad)}</span>`;
}
function driveEndpointMasked(endpoint){
  if(!endpoint)return 'Non renseigné';
  const s=String(endpoint);
  return s.length>46?s.slice(0,32)+'…'+s.slice(-12):s;
}
function buildSyncDiagnostics(){
  const cfg=getDriveConfig();
  const snaps=getSnapshots();
  const endpointOk=!!cfg.endpoint;
  const enabledOk=!!cfg.enabled;
  const currentLocalSize=storageSize(CURRENT_KEY);
  const activeSize=storageSize(KEY);
  const lastSent=cfg.lastSent||'—';
  const lastSentLocal=fmtLocalDateTime(lastSent);
  const lastMode=cfg.lastMode||'current';
  const selectedProject=selected();
  const hasProjects=Array.isArray(state.projects)&&state.projects.length>0;
  const currentSaved=!!localStorage.getItem(CURRENT_KEY);
  const lastAuto = typeof lastAutoSnapshotLabel==='function' ? lastAutoSnapshotLabel() : '—';
  const endpointDisplay=driveEndpointMasked(cfg.endpoint);
  return {cfg,snaps,endpointOk,enabledOk,currentLocalSize,activeSize,lastSent,lastSentLocal,lastMode,selectedProject,hasProjects,currentSaved,lastAuto,endpointDisplay};
}

let driveDiagnostic=null;
let driveDiagnosticLoading=false;
function getDriveDiagnosticUrl(){
  const cfg=getDriveConfig();
  if(!cfg.endpoint)return '';
  return cfg.endpoint+(cfg.endpoint.includes('?')?'&':'?')+'action=diagnostic';
}
function fetchDriveDiagnostic(){
  const cfg=getDriveConfig();
  if(!cfg.endpoint){toast('Endpoint Drive non configuré');return}
  driveDiagnosticLoading=true;renderAll();
  const cb='biDriveDiag_'+Date.now()+'_'+Math.floor(Math.random()*100000);
  window[cb]=function(data){
    driveDiagnosticLoading=false;driveDiagnostic=data;
    try{delete window[cb]}catch(e){window[cb]=undefined}
    toast(data&&data.ok?'Diagnostic Drive réel reçu':'Diagnostic Drive en erreur');
    renderAll();
  };
  const s=document.createElement('script');
  s.src=getDriveDiagnosticUrl()+'&callback='+cb+'&t='+Date.now();
  s.onerror=function(){driveDiagnosticLoading=false;toast('Erreur lecture diagnostic Drive');try{delete window[cb]}catch(e){window[cb]=undefined}renderAll()};
  document.body.appendChild(s);
  setTimeout(()=>{try{s.remove()}catch(e){}},30000);
}

    available:true,
    current:d.counts?.current||0,

}

function clampPct(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)))}
function statusScore(status){
  const s=String(status||'').toLowerCase();
  if(s.includes('validé')||s.includes('valide'))return 100;
  if(s.includes('validation'))return 80;
  if(s.includes('cours'))return 50;
  if(s.includes('traiter'))return 20;
  if(s.includes('idée')||s.includes('idee')||s.includes('brouillon'))return 10;
  return 25;
}

function normKey(v){
  return String(v||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function roadStatusScore(status){
  const s=normKey(status);
  if(s.includes('valide') || s.includes('termine') || s.includes('fait') || s.includes('done'))return 1;
  if(s.includes('validation') || s.includes('test') || s.includes('recette'))return .8;
  if(s.includes('cours') || s.includes('progress') || s.includes('traitement'))return .5;
  if(s.includes('bloque'))return .25;
  return 0;
}
function projectRoadBlocks(projectId){
  const p=selected();
  if(!p)return [];
  // Source réelle des blocs roadmap du Cockpit : les blocs sont stockés dans la fiche projet.
  if(Array.isArray(p.roadmapBlocks))return p.roadmapBlocks;
  if(Array.isArray(p.roadmap))return p.roadmap;
  if(Array.isArray(p.roadBlocks))return p.roadBlocks;
  return [];
}
function projectRoadBlocksDiagnostic(p){
  const blocks=p&&Array.isArray(p.roadmapBlocks)?p.roadmapBlocks:
    p&&Array.isArray(p.roadmap)?p.roadmap:
    p&&Array.isArray(p.roadBlocks)?p.roadBlocks:[];
  return {
    source:p&&Array.isArray(p.roadmapBlocks)?'selectedProject.roadmapBlocks':
      p&&Array.isArray(p.roadmap)?'selectedProject.roadmap':
      p&&Array.isArray(p.roadBlocks)?'selectedProject.roadBlocks':'aucune source roadmap projet',
    blocks
  };
}
function roadBlockLinkDebug(p,blocks){
  const d=projectRoadBlocksDiagnostic(p);
  if(blocks.length)return `${blocks.length} blocs roadmap lus depuis ${d.source}`;
  return `0 bloc roadmap lu · source : ${d.source}`;
}
function renderRoadmapScoreDiagnostic(p){

  }).join('');
  return `<div class="road-score-source">

function estimateDocumentationScore(p){
  let score=0, detail=[];
  const notes=(state.notes||[]).filter(n=>String(n.projectId||'')===String(p.id)||String(n.project||'')===String(p.id)||String(n.projectName||'')===String(p.name));
  if(notes.length>0){score+=40;detail.push('notes présentes')}
  const hasText=(String(p.desc||p.description||p.notes||'').trim().length>20);
  if(hasText){score+=25;detail.push('description renseignée')}
  const links=ensureProjectLinks(p);
  const hasLinks=links.some(l=>l.url);
  if(hasLinks){score+=35;detail.push(`${links.filter(l=>l.url).length} liens projet renseignés`)}
  return {score:clampPct(score),detail:detail.length?detail.join(' · '):'peu de documentation détectée'};
}
function estimateSyncScore(){
  const cfg=getDriveConfig();
  const s=driveRealSummary ? driveRealSummary() : {available:false};
  let score=0, detail=[];
  if(cfg.endpoint){score+=20;detail.push('endpoint configuré')}
  if(cfg.enabled){score+=15;detail.push('sync activée')}
  if(s.available){
    if(Number(s.current)===1){score+=30;detail.push('CURRENT Drive OK')}
    else if(Number(s.current)>1){score+=10;detail.push('doublon CURRENT')}
    if(Number(s.snapshots)>0){score+=20;detail.push('snapshots Drive présents')}
    if(!s.duplicate&&!s.overRetention){score+=15;detail.push('aucune alerte Drive')}
  }else{
    if((cfg.lastMode||'')==='current'){score+=10;detail.push('dernier mode current local')}
    detail.push('Drive réel non lu');
  }
  return {score:clampPct(score),detail:detail.join(' · ')||'sync non configurée'};
}
function estimateProjectProgress(p){
  if(!p)return null;
  const blocks=projectRoadBlocks(p.id);
  let roadScore=0, roadDetail=roadBlockLinkDebug(p,[]);
  if(blocks.length){
    const total=blocks.reduce((a,b)=>a+roadStatusScore(b.status),0);
    roadScore=clampPct((total/blocks.length)*100);
    const valid=blocks.filter(b=>roadStatusScore(b.status)>=1).length;
    const validation=blocks.filter(b=>String(b.status||'').toLowerCase().includes('validation')).length;
    roadDetail=`${blocks.length} blocs projet · ${valid} validés · ${validation} en validation`;
  }
  const statScore=clampPct(statusScore(p.status));
  const sync=estimateSyncScore();
  const doc=estimateDocumentationScore(p);
  const final=clampPct(roadScore*.40 + statScore*.25 + sync.score*.20 + doc.score*.15);
  const manual=Number(p.progress||p.avancement||0);
  return {
    final, manual:clampPct(manual),
    road:{score:roadScore,weight:40,detail:roadDetail},
    status:{score:statScore,weight:25,detail:p.status||'statut inconnu'},
    sync:{score:sync.score,weight:20,detail:sync.detail},
    doc:{score:doc.score,weight:15,detail:doc.detail}
  };
}

function initRightDragDrop(){
  const rail=document.querySelector('.right-rail');
  if(!rail)return;
  let sourceId=null;
  rail.querySelectorAll('.drag-grip[data-drag-id]').forEach(handle=>{
    handle.addEventListener('dragstart',ev=>{
      sourceId=handle.dataset.dragId;
      const card=handle.closest('[data-right-block]');
      card?.classList.add('dragging');
      ev.dataTransfer.effectAllowed='move';
      ev.dataTransfer.setData('text/plain',sourceId);
    });
    handle.addEventListener('dragend',()=>{
      rail.querySelectorAll('.dragging,.drop-before,.drop-after').forEach(x=>x.classList.remove('dragging','drop-before','drop-after'));
    });
  });
  rail.querySelectorAll('[data-right-block]').forEach(card=>{
    card.addEventListener('dragover',ev=>{
      ev.preventDefault();
      const rect=card.getBoundingClientRect();
      card.classList.toggle('drop-before', ev.clientY < rect.top + rect.height/2);
      card.classList.toggle('drop-after', ev.clientY >= rect.top + rect.height/2);
    });
    card.addEventListener('dragleave',()=>card.classList.remove('drop-before','drop-after'));
    card.addEventListener('drop',ev=>{
      ev.preventDefault();
      const targetId=card.dataset.rightBlock;
      const source=sourceId||ev.dataTransfer.getData('text/plain');
      const after=card.classList.contains('drop-after');
      rail.querySelectorAll('.drop-before,.drop-after,.dragging').forEach(x=>x.classList.remove('drop-before','drop-after','dragging'));
      if(!source||!targetId||source===targetId)return;
      const order=getRightOrder().filter(x=>x!==source);
      let idx=order.indexOf(targetId);
      if(after)idx++;
      order.splice(idx,0,source);
      setRightOrder(order);
      renderAll();
    });
  });
}

function ensureProjectLinks(p){
  if(!p.links || !Array.isArray(p.links))p.links=[];
  const seeds=[
    ['Drive',p.driveUrl||p.drive||'','Dossier Google Drive du projet'],
    ['GitHub',p.githubUrl||p.github||'','Repository ou dossier GitHub'],
    ['BI publié',p.publishedUrl||p.url||p.biUrl||'','URL GitHub Pages / version publiée'],
    ['Apps Script',p.appsScriptUrl||p.scriptUrl||'','Endpoint ou projet Apps Script'],
    ['ChatGPT',p.gptUrl||p.chatgptUrl||'','Projet ChatGPT lié']
  ];
  seeds.forEach(([type,url,note])=>{
    if(url && !p.links.some(l=>String(l.url||'')===String(url))){
      p.links.push({
        id:uid(),type,title:type,url,note,
        icon:defaultLinkVisual(type),logoUrl:'',logoDataUrl:'',
        created:nowFr(),updated:nowFr()
      });
    }
  });
  p.links.forEach(l=>{
    if(l.icon===undefined || l.icon===null || l.icon==='') l.icon=defaultLinkVisual(l.type||'Autre');
    if(l.logoUrl===undefined) l.logoUrl='';
    if(l.logoDataUrl===undefined) l.logoDataUrl='';
    if(l.buttonText===undefined) l.buttonText='';
  });
  if(!selectedLinkId && p.links[0]) selectedLinkId=p.links[0].id;
  return p.links;
}
function getLinkLogoSrc(l){
  const data=String(l.logoDataUrl||'').trim();
  if(data) return data;
  const logo=String(l.logoUrl||'').trim();
  if(logo) return safeUrl(logo);
  return '';
}

function duplicateProjectLink(id){

  reader.onload=()=>{ setProjectLinkLogoData(id, String(reader.result||'')); toast('Logo importé'); };

function handleProjectLinkLogoPaste(event,id){
  const items = event.clipboardData?.items || [];
  for(const item of items){
    if(item.type && item.type.startsWith('image/')){

      const file=item.getAsFile();
      if(!file) return;
      const reader=new FileReader();
      reader.onload=()=>{ setProjectLinkLogoData(id, String(reader.result||'')); toast('Logo collé'); };

  (p.notes||[]).filter(n=>/v\d|version|déploiement|deploy/i.test((n.title||'')+' '+(n.text||''))).forEach(n=>versions.push({title:n.title||'Note version',date:n.date||n.created||'',text:n.text||''}));

  versions.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  return versions.slice(0,30);
}

function githubRepoSlugFromProject(p){
  const links=ensureProjectLinks(p);
  const gh=(links.find(l=>String(l.type||'')==='GitHub' && l.url)?.url) || p.githubUrl || p.sources?.githubRepo || '';
  const s=String(gh||'').trim();
  if(!s)return '';
  let m=s.match(/github\.com\/([^\/\s]+)\/([^\/\s#?]+)/i);
  if(m)return `${m[1]}/${m[2].replace(/\.git$/,'')}`;
  m=s.match(/^([^\/\s]+)\/([^\/\s]+)$/);
  if(m)return `${m[1]}/${m[2].replace(/\.git$/,'')}`;
  return '';
}

function detectVersionFromText(txt){
  const s=String(txt||'');
  const m=s.match(/\bV?\d+(?:\.\d+)*[A-Z]?\b/i) || s.match(/\bV\d+[_\.\-]\d+[A-Z]?\b/i);
  if(!m)return '';
  let v=m[0].replace(/_/g,'.').replace(/-/g,'.');
  if(!/^V/i.test(v))v='V'+v;
  return v.toUpperCase();
}
function cleanCommitDescription(msg){
  const lines=String(msg||'').split('\n').map(x=>x.trim()).filter(Boolean);
  if(lines.length<=1)return '';
  return lines.slice(1).join('\n').slice(0,900);
}
function versionFromFilename(name){
  const s=String(name||'');
  const m=s.match(/V\d+(?:[_\.\-]\d+)*[A-Z]?/i);
  return m ? m[0].replace(/_/g,'.').replace(/-/g,'.').toUpperCase() : '';
}

async function fetchGitHubJson(url){
  const res=await fetch(url,{headers:{'Accept':'application/vnd.github+json'}});
  if(!res.ok)throw new Error('GitHub '+res.status);
  return await res.json();
}
async function fetchGitHubCommitsPaged(slug,path='',maxPages=6){
  const all=[];
  for(let page=1; page<=maxPages; page++){
    const url=`https://api.github.com/repos/${slug}/commits?per_page=100&page=${page}${path?`&path=${encodeURIComponent(path)}`:''}`;
    const data=await fetchGitHubJson(url);
    if(!Array.isArray(data) || !data.length)break;
    all.push(...data);
    if(data.length<100)break;
  }
  return all;
}
async function fetchGitHubWorkflowRuns(slug,maxPages=3){
  const all=[];
  for(let page=1; page<=maxPages; page++){
    const url=`https://api.github.com/repos/${slug}/actions/runs?per_page=100&page=${page}&_=${Date.now()}`;
    const data=await fetchGitHubJson(url);
    const runs=data.workflow_runs||[];
    if(!runs.length)break;
    all.push(...runs);
    if(runs.length<100)break;
  }
  return all;
}
function detectVersionFromRun(run){
  return detectVersionFromText([
    run.display_title,
    run.name,
    run.head_commit?.message,
    run.head_branch,
    run.path,
    run.event
  ].filter(Boolean).join(' '));
}
function buildRunVersionItems(runs){
  return (runs||[]).map(r=>({
    id:r.id,
    version:detectVersionFromRun(r),
    title:r.display_title||r.name||'Workflow run',
    name:r.name||'workflow',
    date:r.created_at||r.run_started_at||r.updated_at||'',
    updated:r.updated_at||'',
    conclusion:r.conclusion||r.status||'',
    branch:r.head_branch||'',
    sha:String(r.head_sha||'').slice(0,7),
    url:r.html_url||'',
    event:r.event||''
  })).sort((a,b)=>String(b.date||b.updated||'').localeCompare(String(a.date||a.updated||'')));
}
function workflowStatusClass(r){
  const s=String(r.conclusion||'').toLowerCase();
  if(s==='success')return 'ok';
  if(s==='failure'||s==='cancelled'||s==='timed_out')return 'bad';
  return 'run';
}

const GH_CACHE_KEY='bi_central_github_history_cache_v65g3';
const GH_REFRESH_MINUTES=15;
function ghCacheRead(){
  try{return JSON.parse(localStorage.getItem(GH_CACHE_KEY)||'null')}catch(e){return null}
}
function ghCacheWrite(payload){
  try{localStorage.setItem(GH_CACHE_KEY,JSON.stringify(Object.assign({savedAt:new Date().toISOString()},payload||{})))}catch(e){}
}
function ghCacheAgeMinutes(){
  const c=ghCacheRead();
  if(!c||!c.savedAt)return null;
  const d=new Date(c.savedAt);
  if(isNaN(d))return null;
  return Math.max(0,Math.round((Date.now()-d.getTime())/60000));
}
function ghApplyCache(){
  const c=ghCacheRead();
  if(!c)return false;
  externalVersionHistory.github=Array.isArray(c.github)?c.github:externalVersionHistory.github||[];
  externalVersionHistory.githubRuns=Array.isArray(c.githubRuns)?c.githubRuns:externalVersionHistory.githubRuns||[];
  externalVersionHistory.status=c.status||externalVersionHistory.status||'Cache GitHub chargé';
  externalVersionHistory.updated=c.updated||c.savedAt||externalVersionHistory.updated||'';
  externalVersionHistory.scan=c.scan||externalVersionHistory.scan||{commits:0,runs:0,pages:0,warnings:[]};
  return true;
}
function ghCanRefresh(force=false){
  if(force)return true;
  const age=ghCacheAgeMinutes();
  return age===null || age>=GH_REFRESH_MINUTES;
}
function ghCacheStatusHtml(){
  const age=ghCacheAgeMinutes();
  const c=ghCacheRead();
  const has=(externalVersionHistory.github||[]).length || (externalVersionHistory.githubRuns||[]).length || c;
  if(!has)return `<div class="github-cache-warn"><b>Cache GitHub :</b> aucun historique local. Premier chargement autorisé.</div>`;
  return `<div class="github-cache-panel"><b>Cache GitHub protégé :</b> dernière synchro ${age===null?'inconnue':'il y a '+age+' min'} · refresh bloqué si moins de ${GH_REFRESH_MINUTES} min. En cas d’erreur GitHub, les anciennes données sont conservées.</div>`;
}
function clearGithubCache(){
  localStorage.removeItem(GH_CACHE_KEY);
  externalVersionHistory.github=[];

async function fetchGitHubVersionHistory(force=false){
  const p=selected();
  const slug=githubRepoSlugFromProject(p);
  if(!slug){toast('Lien GitHub non renseigné');return}
  if(!ghCanRefresh(force)){
    ghApplyCache();
    externalVersionHistory.status='Cache GitHub utilisé · refresh protégé';
    toast('GitHub protégé : cache utilisé');
    renderAll();
    return;
  }
  externalVersionHistory.status='Scan GitHub étendu...';
  externalVersionHistory.scan={commits:0,runs:0,pages:0,warnings:[]};
  renderAll();
  try{
    const path=p.sources?.githubPath||'';
    const list=await fetchGitHubCommitsPaged(slug,path,6);
    const runs=await fetchGitHubWorkflowRuns(slug,3).catch(e=>{
      externalVersionHistory.scan.warnings.push('Workflows non lisibles : '+e.message);
      return [];
    });
    const details=[];
    for(const c of list.slice(0,120)){
      try{
        const d=await fetchGitHubJson(c.url);
        const files=(d.files||[]).map(f=>({
          filename:f.filename||'',
          status:f.status||'modified',
          additions:f.additions||0,
          deletions:f.deletions||0,
          changes:f.changes||0,
          patch:(f.patch||'').slice(0,600)
        }));
        const msg=d.commit?.message||c.commit?.message||'';
        let version=detectVersionFromText(msg);
        if(!version){
          const fileVersion=files.map(f=>versionFromFilename(f.filename)).find(Boolean);
          if(fileVersion)version=fileVersion;
        }
        details.push({
          sha:String(d.sha||c.sha||'').slice(0,7),
          fullSha:d.sha||c.sha||'',
          version,
          title:msg.split('\n')[0]||'Commit',
          description:cleanCommitDescription(msg),
          text:msg,
          date:d.commit?.committer?.date||d.commit?.author?.date||c.commit?.committer?.date||'',
          author:d.commit?.author?.name||c.commit?.author?.name||'',
          url:d.html_url||c.html_url||'',
          stats:d.stats||{},
          files
        });
      }catch(inner){
        const msg=c.commit?.message||'Commit';
        details.push({
          sha:String(c.sha||'').slice(0,7),
          fullSha:c.sha||'',
          version:detectVersionFromText(msg),
          title:msg.split('\n')[0]||'Commit',
          description:cleanCommitDescription(msg),
          text:msg,
          date:c.commit?.committer?.date||c.commit?.author?.date||'',
          author:c.commit?.author?.name||'',
          url:c.html_url||'',
          stats:{},
          files:[]
        });
      }
    }
    externalVersionHistory.github=details;
    externalVersionHistory.githubRuns=buildRunVersionItems(runs);
    externalVersionHistory.scan.commits=list.length;
    externalVersionHistory.scan.runs=runs.length;
    externalVersionHistory.scan.pages=Math.ceil(list.length/100);
    const unique=uniqueGithubVersions().length;
    externalVersionHistory.status=`GitHub étendu OK · workflows visibles · ${unique} version(s) · ${details.length} commit(s) · ${runs.length} workflow(s)`;
    externalVersionHistory.updated=nowFr();
    ghCacheWrite({
      github:externalVersionHistory.github,
      githubRuns:externalVersionHistory.githubRuns,
      status:externalVersionHistory.status,
      updated:externalVersionHistory.updated,
      scan:externalVersionHistory.scan
    });
    toast('Historique GitHub + workflows chargé');
    renderAll();
  }catch(e){
    const used=ghApplyCache();
    externalVersionHistory.status=used ? 'Erreur GitHub · cache conservé' : 'Erreur GitHub : '+e.message;
    toast(used?'Erreur GitHub : cache conservé':'Erreur GitHub');
    renderAll();
  }
}

function groupedGitHubVersions(){
  const gh=externalVersionHistory.github||[];
  const runs=externalVersionHistory.githubRuns||[];
  const unclassified=gh.filter(c=>!c.version);
  const groups={};
  gh.filter(c=>c.version).forEach(c=>{
    if(!groups[c.version])groups[c.version]=[];
    groups[c.version].push(c);
  });
  // Ajoute une entrée synthétique si une version existe uniquement dans les workflows.
  runs.filter(r=>r.version).forEach(r=>{
    if(!groups[r.version])groups[r.version]=[];
    if(!groups[r.version].some(c=>c.sha && r.sha && c.sha===r.sha)){
      groups[r.version].push({
        sha:r.sha||'workflow',
        fullSha:r.sha||'',
        version:r.version,
        title:r.title||r.name||'Workflow',
        description:`Workflow ${r.name||''} · ${r.conclusion||''} · ${r.branch||''}`,
        text:r.title||'',
        date:r.date||'',
        author:'GitHub Actions',
        url:r.url||'',
        stats:{},
        files:[],
        workflow:true
      });
    }
  });
  return {groups,unclassified};
}

function buildBiSessions(events,gapMin=90){
  const sessions=[]; let cur=null;
  events.forEach(e=>{
    const d=parseBiDate(e.date); if(!d)return;
    const item=Object.assign({},e,{_date:d});
    if(!cur){cur={start:d,end:d,events:[item],minutes:e.minutes||15};sessions.push(cur);return}
    const gap=Math.round((d-cur.end)/60000);
    if(gap>gapMin){
      cur={start:d,end:d,events:[item],minutes:e.minutes||15};sessions.push(cur);
    }else{
      cur.events.push(item); cur.end=d; cur.minutes+=e.minutes||15;
    }
  });
  sessions.forEach(s=>{s.span=Math.max(0,Math.round((s.end-s.start)/60000)); s.estimate=Math.max(s.minutes,s.span||s.minutes)});
  return sessions;
}
function renderSessionTimeline(sessions){
  return sessions.map((s,i)=>{
    const span=Math.max(1,s.span);
    return `<div class="time-session">
      <div class="time-session-head"><h4>Session ${i+1} · ${fmtBiDateTime(s.start)}</h4><span class="pill">${Math.round(s.estimate)} min</span></div>

      </div>

}

function downloadTextFile(filename,content,mime='text/plain'){
  const blob=new Blob([content],{type:mime+';charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500);
}

function isFormLike(el){
  return el && ['INPUT','TEXTAREA','SELECT'].includes(el.tagName);
}
function captureUiDrafts(){
  try{
    uiDrafts={};
    document.querySelectorAll('input[id],textarea[id],select[id]').forEach(el=>{
      uiDrafts[el.id]=el.value;
    });
    const a=document.activeElement;
    if(isFormLike(a) && a.id){
      uiRestoreFocus={id:a.id,start:a.selectionStart||0,end:a.selectionEnd||0};
    }else{
      uiRestoreFocus=null;
    }
  }catch(e){}
}
function restoreUiDrafts(){
  try{
    Object.entries(uiDrafts||{}).forEach(([id,val])=>{
      const el=document.getElementById(id);
      if(el && el.value!==val)el.value=val;
    });
    if(uiRestoreFocus && uiRestoreFocus.id){
      const el=document.getElementById(uiRestoreFocus.id);
      if(el){
        el.focus({preventScroll:true});
        if(typeof el.setSelectionRange==='function'){
          const len=String(el.value||'').length;
          const s=Math.min(uiRestoreFocus.start,len), e=Math.min(uiRestoreFocus.end,len);
          el.setSelectionRange(s,e);
        }
      }
    }
  }catch(e){}
}
function safeRenderAll(){
  captureUiDrafts();
  renderAll();
  setTimeout(restoreUiDrafts,0);
}
function scheduleSoftRender(){
  if(isFormLike(document.activeElement)){
    captureUiDrafts();
    setTimeout(()=>{ if(!isFormLike(document.activeElement)) renderAll(); },250);
  }else{
    renderAll();
  }
}

function decorateSubObjectsStair(){
  try{
    const root=document.getElementById('projectList');
    if(!root || !window.state || !Array.isArray(state.projects))return;
    // Nettoyage uniquement de nos ajouts précédents
    root.querySelectorAll('.bi-subobject-stair').forEach(el=>el.classList.remove('bi-subobject-stair'));
    root.querySelectorAll('.bi-subobject-mini').forEach(el=>el.remove());

    state.projects.filter(p=>p && p.parentId).forEach(p=>{
      const parent=state.projects.find(x=>x.id===p.parentId);
      const cards=[...root.querySelectorAll('.card,.project-card,.project-item,.item,.subcard,[onclick]')];
      const card=cards.find(el=>(el.textContent||'').includes(p.name||'') && !el.classList.contains('bi-subobject-mini'));
      if(!card)return;
      card.classList.add('bi-subobject-stair');
      const label=document.createElement('span');
      label.className='bi-subobject-mini';
      label.innerHTML='↳ sous-objet lié à : <b>'+esc(parent?.name||'parent')+'</b>';
      const target=card.querySelector('h3,b,.title,.card-title')?.parentElement || card;
      target.appendChild(label);
    });
  }catch(e){
    console.warn('Décor sous-objet ignoré',e);
  }
}


function isProjectDeleted(p){
  return !!(p && (p.deleted===true || p.status==='Supprimé' || p.space==='Supprimé'));
}
function softDeleteProject(id){
  const p=state.projects.find(x=>x.id===id);
  if(!p)return;
  if(!confirm('Mettre ce projet dans Supprimé ? Il pourra être restauré.'))return;
  p.deleted=true;
  p.deletedAt=nowFr();
  p.previousSpace=p.previousSpace||p.space;
  p.previousStatus=p.previousStatus||p.status;
  p.space='Supprimé';
  p.status='Supprimé';
  p.updated=nowFr();
  persist('projet mis en corbeille '+p.name);
  toast('Projet déplacé dans Supprimé');
  renderAll();
}
function restoreProject(id){
  const p=state.projects.find(x=>x.id===id);
  if(!p)return;
  p.deleted=false;
  p.restoredAt=nowFr();
  p.space=p.previousSpace||'Pro Clients';
  p.status=p.previousStatus&&p.previousStatus!=='Supprimé'?p.previousStatus:'À tester';
  p.updated=nowFr();
  persist('projet restauré '+p.name);
  toast('Projet restauré');
  renderAll();
}
function decorateTrashControls(){
  try{
    const p=selected();
    const detail=document.getElementById('detailPanel') || document.querySelector('.detail,.side-detail,.right-panel,aside.right');
    if(detail && p){
      let box=document.getElementById('trashActionsBox');
      if(!box){
        box=document.createElement('div');
        box.id='trashActionsBox';
        box.className='trash-actions';
        detail.appendChild(box);
      }
      box.innerHTML=isProjectDeleted(p)
        ? `<button class="restore-btn" onclick="restoreProject('${p.id}')">♻ Restaurer le projet</button>`
        : `<button class="trash-btn" onclick="softDeleteProject('${p.id}')">🗑 Mettre dans Supprimé</button>`;
    }

    const root=document.getElementById('projectList');
    if(!root)return;
    root.querySelectorAll('.deleted-project-card').forEach(el=>el.classList.remove('deleted-project-card'));
    root.querySelectorAll('.deleted-pill').forEach(el=>el.remove());

    state.projects.filter(isProjectDeleted).forEach(p=>{
      const cards=[...root.querySelectorAll('.card,.project-card,.project-item,.item,.subcard,[onclick]')];
      const card=cards.find(el=>(el.textContent||'').includes(p.name||''));
      if(!card)return;
      card.classList.add('deleted-project-card');
      const label=document.createElement('span');
      label.className='deleted-pill';
      label.textContent='Supprimé · restaurable';
      const target=card.querySelector('h3,b,.title,.card-title')?.parentElement || card;
      target.appendChild(label);
    });
  }catch(e){
    console.warn('Décor corbeille ignoré',e);
  }
}


let showDeletedProjects=false;
function ensureStartupSelection(){
  try{
    if(!state || !Array.isArray(state.projects))return;
    // Ne jamais démarrer sur l'espace Supprimé si cet état a été conservé par erreur.
    if(activeSpace==='Supprimé')activeSpace='Tous';
    const current=state.projects.find(p=>p.id===state.selectedId);
    if(current && !isProjectDeleted(current))return;
    const firstActive=state.projects.find(p=>!isProjectDeleted(p));
    if(firstActive)state.selectedId=firstActive.id;
  }catch(e){console.warn('init selection ignorée',e)}
}
function toggleDeletedProjects(){
  showDeletedProjects=!showDeletedProjects;
  document.body.classList.toggle('show-deleted',showDeletedProjects);
  decorateDeletedToggle();
  decorateTrashControls();
}
function decorateDeletedToggle(){
  try{
    const root=document.getElementById('projectList');
    if(!root)return;
    root.querySelectorAll('#deletedToggleBtn').forEach(x=>x.remove());
    const deletedCount=state.projects.filter(isProjectDeleted).length;
    if(!deletedCount)return;
    const btn=document.createElement('button');
    btn.id='deletedToggleBtn';
    btn.className=showDeletedProjects?'active':'';
    btn.textContent=showDeletedProjects ? `Masquer Supprimés (${deletedCount})` : `Supprimés (${deletedCount})`;
    btn.onclick=toggleDeletedProjects;
    root.prepend(btn);
    document.body.classList.toggle('show-deleted',showDeletedProjects);
  }catch(e){console.warn('toggle supprimé ignoré',e)}
}

  if(!cfg.htmlSourceName)cfg.htmlSourceName='';

function deploy69IndexHtml(){
  const {cfg}=deploy69Derived();
  if(cfg.sourceMode==='uploaded'&&cfg.htmlSourceContent)return cfg.htmlSourceContent;
  return deploy69TemplateHtml();
}
function deploy69Manifest(){
  const {p,cfg,name,slug,rootDrive,appPath,url,tpl,kids,ident}=deploy69Derived();
  return JSON.stringify({
    version:'V0.1',
    generated_from:'BI Central V6.10A',
    project:name,
    slug,
    kind:p.kind||'parent',
    space:p.space,
    type:p.type,
    client:p.client,
    status:p.status,
    phase:p.phase,
    source_mode:cfg.sourceMode,
    source_file:cfg.htmlSourceName||'',
    template:cfg.templateId,
    template_name:tpl.name,
    github_path:appPath,
    public_url:url,
    drive_root:rootDrive,
    identity:ident,
    modules:kids.map(k=>({id:k.id,name:k.name,type:k.type,github_path:k.sources?.githubPath,pages_url:k.sources?.pagesUrl})),
    data_drive:deploy69DataSources(),
    checklist:p.deployChecklist||{}
  },null,2);
}
function deploy69Readme(){
  const {p,cfg,name,rootDrive,appPath,url,tpl,kids,ident}=deploy69Derived();
  return `# ${name}

Version : V0.1
Source BI : ${cfg.sourceMode==='uploaded'?'HTML fourni — '+(cfg.htmlSourceName||'fichier importé'):cfg.sourceMode==='empty'?'Base vide':'Modèle prédéfini — '+tpl.name}
Espace : ${p.space||''}
Client / réseau : ${p.client||''}

## Objectif
${ident.shortDescription||p.goal||''}

## Description longue
${ident.longDescription||ident.problem||''}

## Structure cible
Drive : ${rootDrive}
GitHub : ${appPath}
URL : ${url}

## Modules liés
${kids.map(k=>'- '+(k.icon||'🧩')+' '+k.name+' — '+(k.goal||'')).join('\n')||'- Aucun module lié pour l’instant'}

## Google Drive data
Racine données : ${cfg.dataRoot||rootDrive+'/02_DONNEES'}
Mode data : ${cfg.dataMode||'Drive + JSON local'}
Synchro : ${cfg.dataSyncDirection||'Drive → BI puis export BI → Drive'}

${cfg.deploymentNote||'À compléter après test local.'}

Généré depuis BI Central V6.10A.`;
}

    {title:'Préparer arborescence projet',type:'Déploiement',status:'À faire',priority:'Haute',text:deploy69FolderTree()},
    {title:'Cadrer Google Drive data',type:'Données',status:'À faire',priority:'Haute',text:deploy69DriveDataMap()},
    {title:'Générer index.html V0',type:'Développement',status:'À faire',priority:'Haute',text:'Source : '+cfg.sourceMode+'. Tester localement le fichier HTML.'},
    {title:'Publier / livrer',type:'Livraison',status:'À faire',priority:'Moyenne',text:`Drive ${rootDrive} · GitHub ${appPath} · URL ${url}`}

}

function deploy69ContextIa(){
  const {p}=deploy69Derived();
  if(typeof projectIdentityPrompt==='function')return projectIdentityPrompt(p)+'\n\n---\nDEPLOIEMENT V6.10A\n'+deploy69FolderTree()+'\n\n---\nGOOGLE DRIVE DATA\n'+deploy69DriveDataMap();
  return deploy69Readme()+'\n\n'+deploy69DriveDataMap();

function deploy69Download(kind){
  if(kind==='index')downloadTextFile('index.html',deploy69IndexHtml(),'text/html');
  if(kind==='manifest')downloadTextFile('manifest.json',deploy69Manifest(),'application/json');
  if(kind==='roadmap')downloadTextFile('roadmap.json',deploy69Roadmap(),'application/json');
  if(kind==='readme')downloadTextFile('README.md',deploy69Readme(),'text/markdown');
  if(kind==='data')downloadTextFile('data-demo.json',deploy69DataDemo(),'application/json');
  if(kind==='identity')downloadTextFile('fiche_identite.json',deploy69FicheIdentiteJson(),'application/json');
  if(kind==='context')downloadTextFile('contexte_ia.md',deploy69ContextIa(),'text/markdown');
  if(kind==='dataSources')downloadTextFile('data_sources.json',deploy69DataSourcesJson(),'application/json');
  if(kind==='driveMap')downloadTextFile('drive_data_map.md',deploy69DriveDataMap(),'text/markdown');
  if(kind==='tree')downloadTextFile('arborescence_projet.txt',deploy69FolderTree(),'text/plain');
  toast('Fichier V6.10A généré');
}
function downloadProjectPackFile(kind){deploy69Download(kind)}

function deploy69ImportHtml(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    const p=selected(); if(!p)return;
    deploy69EnsureConfig(p);
    p.deployConfig.sourceMode='uploaded';
    p.deployConfig.htmlSourceName=file.name;
    p.deployConfig.htmlSourceContent=String(reader.result||'');
    p.updated=nowFr();
    persist('import HTML source '+file.name);
    toast('HTML source chargé');
    input.value='';
    renderAll();
  };
  reader.readAsText(file,'utf-8');
}
function deploy69CreateRoadmapBlocks(){
  const {p,cfg}=deploy69Derived();
  p.roadmapBlocks=p.roadmapBlocks||[];
  p.roadmapBlocks.push({id:uid(),title:'Déploiement projet complet V0.1',type:'Déploiement',status:'À valider',priority:'Haute',text:deploy69FolderTree(),created:nowFr(),updated:nowFr()});
  p.roadmapBlocks.push({id:uid(),title:'Cadrer Google Drive data',type:'Données',status:'À faire',priority:'Haute',text:deploy69DriveDataMap(),created:nowFr(),updated:nowFr()});
  p.roadmapBlocks.push({id:uid(),title:'Tester source BI '+(cfg.sourceMode||'template'),type:'Test',status:'À faire',priority:'Haute',text:'Ouvrir index.html généré, vérifier navigation et données de départ.',created:nowFr(),updated:nowFr()});
  p.versions=p.versions||[];
  p.versions.unshift({id:uid(),name:'V0.1',version:'V0.1',type:'Déploiement',title:'Pack V0 préparé',date:nowFr(),text:'Pack projet préparé depuis l’assistant V6.10A.'});
  persist('roadmap déploiement V6.10A');
  toast('Roadmap de déploiement ajoutée');
  renderAll();
}
function deploy69RenderChecks(){
  const {p,cfg,rootDrive,appPath,url}=deploy69Derived();
  const auto={
    identity:!!p.goal,
    source:!!(cfg.sourceMode==='uploaded'?cfg.htmlSourceContent:cfg.sourceMode),
    tree:!!(rootDrive&&appPath&&url),
    dataDrive:!!(cfg.dataRoot||rootDrive),
    pack:true,
    localtest:false,
    publish:cfg.stage==='Publié'||cfg.stage==='Testé'||cfg.stage==='Livré',
    delivery:cfg.stage==='Livré'
  };
  const manual=p.deployChecklist||{};
  return `<div class="deploy69-checks">${DEPLOY69_CHECKS.map(c=>{const ok=!!(manual[c[0]]||auto[c[0]]);return `<div class="deploy69-check ${ok?'ok':'warn'}"><span class="mark">${ok?'✓':'!'}</span><div><b>${esc(c[1])}</b><br><small class="muted">${esc(c[2])}</small></div><button class="tiny-btn" onclick="deploy69ToggleCheck('${c[0]}')">${manual[c[0]]?'Annuler':'OK manuel'}</button></div>`}).join('')}</div>`;
}

function deploy610AppsScriptTemplate(){return `/**
 * BI Central V6.10A — Drive Deploy endpoint
 * 1) Créer un projet Apps Script.
 * 2) Coller ce code.
 * 3) Dans Paramètres du projet > Propriétés du script, ajouter DEPLOY_SECRET si souhaité.
 * 4) Déployer > Nouvelle application web > Exécuter en tant que moi.
 * 5) Coller l'URL /exec dans le Cockpit.
 */
function doPost(e) {
  try {
    var raw = e && e.postData && e.postData.contents ? e.postData.contents : '{}';
    var payload = JSON.parse(raw);
    var expectedSecret = PropertiesService.getScriptProperties().getProperty('DEPLOY_SECRET') || '';
    if (expectedSecret && payload.secret !== expectedSecret) {
      return json_({success:false, error:'unauthorized'});
    }
    if (payload.action === 'ping') {
      return json_({success:true, pong:true, at:new Date().toISOString()});
    }
    if (payload.action !== 'deploy_project_drive' && payload.action !== 'simulate_drive_deploy') {
      return json_({success:false, error:'unknown action', action:payload.action});
    }
    var result = deployProjectDrive_(payload);
    return json_({success:true, result:result, at:new Date().toISOString()});
  } catch (err) {
    return json_({success:false, error:String(err && err.stack ? err.stack : err)});
  }
}

function json_(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj, null, 2)).setMimeType(ContentService.MimeType.JSON);
}

function deployProjectDrive_(payload) {
  var drive = payload.drive || {};
  var rootName = safeName_(drive.rootName || (payload.project && payload.project.name) || 'BI_PROJECT');
  var root = DriveApp.createFolder(rootName);
  var folders = {'': root};
  var folderUrls = {'/': root.getUrl()};
  (drive.folders || []).forEach(function(path) {
    var folder = ensureFolderPath_(root, folders, path);
    folderUrls[path] = folder.getUrl();
  });
  var files = payload.files || {};
  var createdFiles = [];
  Object.keys(files).forEach(function(path) {
    var file = createTextFile_(root, folders, path, String(files[path] || ''));
    createdFiles.push({path:path, url:file.getUrl()});
  });
  return {
    driveRootName: rootName,
    driveRootUrl: root.getUrl(),
    dataRootUrl: folderUrls['02_DONNEES'] || '',
    folders: folderUrls,
    files: createdFiles
  };
}

function ensureFolderPath_(root, folders, path) {
  path = String(path || '').replace(/^\\/+|\\/+$/g, '');
  if (!path) return root;
  var parts = path.split('/').filter(Boolean);
  var current = root;
  var key = '';
  parts.forEach(function(part) {
    key = key ? key + '/' + safeName_(part) : safeName_(part);
    if (!folders[key]) folders[key] = current.createFolder(safeName_(part));
    current = folders[key];
  });
  return current;
}

function createTextFile_(root, folders, relativePath, content) {
  relativePath = String(relativePath || 'file.txt').replace(/^\\/+|\\/+$/g, '');
  var parts = relativePath.split('/').filter(Boolean);
  var fileName = safeName_(parts.pop() || 'file.txt');
  var folderPath = parts.join('/');
  var folder = ensureFolderPath_(root, folders, folderPath);
  return folder.createFile(fileName, content, mimeFor_(fileName));
}

function mimeFor_(name) {
  name = String(name || '').toLowerCase();
  if (name.slice(-5) === '.html') return MimeType.HTML;
  if (name.slice(-5) === '.json') return MimeType.PLAIN_TEXT;
  if (name.slice(-3) === '.md') return MimeType.PLAIN_TEXT;
  if (name.slice(-4) === '.csv') return MimeType.CSV;
  return MimeType.PLAIN_TEXT;
}

function safeName_(name) {
  return String(name || 'BI_PROJECT').replace(/[\\\\/:*?"<>|#%{}~&]/g, '_').trim().slice(0, 120) || 'BI_PROJECT';
}
`;}
