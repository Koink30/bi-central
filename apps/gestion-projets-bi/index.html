<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cockpit Projets BI · V6.4X Roadmap score diagnostic</title>
<style>
:root{
  --bg:#030711;--bg2:#06112a;--panel:rgba(7,18,41,.82);--panel2:rgba(9,28,61,.72);
  --line:#1aa7ff;--cyan:#28eaff;--blue:#197bff;--green:#35f384;--violet:#b45dff;--orange:#ffc34d;--red:#ff6472;
  --txt:#f5fbff;--muted:#9ec5df;--muted2:#6f91ad;--radius:22px;
  --shadow:0 0 30px rgba(22,143,255,.18), inset 0 0 26px rgba(37,177,255,.045);
  --font:Inter,Segoe UI,Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:var(--font);color:var(--txt);background:radial-gradient(circle at 48% 12%,#0d3265 0,#050b1c 38%,#02040d 100%);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(circle at 8% 8%,rgba(29,151,255,.20),transparent 22%),
  radial-gradient(circle at 92% 13%,rgba(63,255,139,.11),transparent 22%),
  radial-gradient(circle at 72% 84%,rgba(180,93,255,.13),transparent 26%),
  linear-gradient(115deg,rgba(255,255,255,.035) 0 1px,transparent 1px 120px);z-index:-2}
body:after{content:"";position:fixed;inset:-40px;pointer-events:none;background-image:radial-gradient(rgba(42,220,255,.40) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 50% 25%,black,transparent 72%);opacity:.14;z-index:-1}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;color:var(--txt);border:0} a{color:inherit;text-decoration:none}
.app{width:100%;max-width:none;margin:0 auto;padding:18px clamp(8px,1.1vw,18px)}
.header{display:grid;grid-template-columns:minmax(420px,1fr) minmax(520px,720px);gap:12px;margin-bottom:12px}
.brand,.quick,.actionbar,.family,.panel,.kpi{border:1px solid rgba(55,177,255,.32);background:linear-gradient(145deg,rgba(8,20,45,.82),rgba(4,9,26,.78));box-shadow:var(--shadow);border-radius:26px;position:relative;overflow:hidden}
.brand:before,.quick:before,.actionbar:before,.family:before,.panel:before,.kpi:before{content:"";position:absolute;inset:0;background:linear-gradient(105deg,rgba(255,255,255,.052),transparent 28%,transparent 78%,rgba(42,234,255,.035));pointer-events:none}
.brand{display:flex;align-items:center;gap:18px;padding:18px 20px}
.logo{width:78px;height:78px;border-radius:24px;display:grid;place-items:center;font-size:37px;font-weight:950;background:radial-gradient(circle at 35% 25%,#64f8ff,#0d80ff 48%,#071229 75%);box-shadow:0 0 28px rgba(34,180,255,.60),inset 0 0 22px rgba(255,255,255,.12);position:relative;flex:0 0 78px}
.logo:after{content:"";position:absolute;inset:-7px;border-radius:29px;border:1px dashed rgba(40,234,255,.5)}
h1{margin:0;font-size:clamp(32px,4vw,52px);line-height:.96;text-transform:uppercase;letter-spacing:.018em;text-shadow:0 0 20px rgba(40,234,255,.30)}
.subtitle{margin:8px 0 0;color:var(--cyan);font-size:16px}.muted{color:var(--muted)}
.quick{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:14px}
.toplink{min-width:178px;display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:17px;border:1px solid rgba(89,190,255,.36);background:linear-gradient(180deg,rgba(12,39,78,.94),rgba(7,18,42,.91));box-shadow:0 0 16px rgba(28,143,255,.11);font-weight:950}
.toplink:hover{transform:translateY(-1px);border-color:rgba(74,229,255,.82);box-shadow:0 0 22px rgba(40,234,255,.20)}
.toplink small{display:block;color:var(--muted2);font-size:11px;font-weight:800}.topicon{width:28px;height:28px;display:grid;place-items:center;font-size:24px}.topicon svg{width:28px;height:28px}
.actionbar{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;padding:10px;margin-bottom:12px}
.btn,.mini-btn,.tab{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border-radius:14px;border:1px solid rgba(89,190,255,.35);background:linear-gradient(180deg,rgba(12,39,78,.92),rgba(7,18,42,.91));box-shadow:0 0 14px rgba(28,143,255,.10);font-weight:900;font-size:13px;color:#f5fbff}
.btn:hover,.mini-btn:hover,.tab:hover{border-color:rgba(74,229,255,.8);box-shadow:0 0 20px rgba(40,234,255,.18)}
.btn.green{border-color:rgba(53,243,132,.50)}.btn.violet{border-color:rgba(180,93,255,.55)}.btn.orange{border-color:rgba(255,195,77,.55)}.btn.red{border-color:rgba(255,100,114,.58)}
.familybar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.family{padding:14px 16px}.family h3{display:flex;align-items:center;gap:11px;margin:0 0 12px;font-size:19px}.family .ico{font-size:25px;filter:drop-shadow(0 0 10px rgba(40,234,255,.45))}
.tabs{display:flex;gap:7px;flex-wrap:wrap}.tab{padding:9px 11px;font-size:12px}.tab.active{background:linear-gradient(180deg,rgba(38,116,255,.75),rgba(57,20,126,.70));border-color:rgba(180,93,255,.80);box-shadow:0 0 18px rgba(180,93,255,.22)}
.layout{display:grid;grid-template-columns:340px minmax(0,1fr) 320px;gap:12px;align-items:start}
.panel{padding:16px}.panel-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.panel-title h2{margin:0;font-size:17px;text-transform:none}
.project-tools{display:flex;gap:8px}.icon-btn{width:36px;height:36px;border-radius:12px;border:1px solid rgba(95,184,255,.25);background:rgba(3,12,28,.7);display:grid;place-items:center}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.filters input{grid-column:1/-1}
input,select,textarea{width:100%;padding:10px 11px;border-radius:13px;border:1px solid rgba(87,174,238,.30);background:rgba(3,10,25,.70);color:#effbff;outline:none}
textarea{resize:vertical;min-height:76px} input:focus,select:focus,textarea:focus{border-color:rgba(40,234,255,.8);box-shadow:0 0 0 3px rgba(40,234,255,.10)}
.list{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow:auto;padding-right:3px}
.card{display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center;padding:10px;border-radius:17px;border:1px solid rgba(76,174,255,.22);background:linear-gradient(135deg,rgba(9,31,69,.70),rgba(5,12,31,.70));transition:.15s}
.card:hover{transform:translateX(2px);border-color:rgba(40,234,255,.55)}.card.active{border-color:rgba(40,234,255,.95);box-shadow:0 0 21px rgba(40,234,255,.17),inset 0 0 18px rgba(40,234,255,.05)}
.card-ico{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;font-size:25px;border:1px solid rgba(92,202,255,.28);background:rgba(37,142,255,.13)}
.card h3{margin:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;border:1px solid rgba(101,189,255,.30);background:rgba(10,35,72,.50);font-size:11px;color:#d7edff;white-space:nowrap;font-weight:800}
.pill.green{border-color:rgba(53,243,132,.48);color:#d9ffe7}.pill.orange{border-color:rgba(255,195,77,.52);color:#ffe2a5}.pill.red{border-color:rgba(255,100,114,.52);color:#ffc8cd}.pill.violet{border-color:rgba(180,93,255,.46);color:#ebd5ff}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--muted);box-shadow:0 0 10px currentColor}.dot.green{background:var(--green)}.dot.orange{background:var(--orange)}.dot.red{background:var(--red)}.dot.blue{background:var(--cyan)}.dot.violet{background:var(--violet)}
.detail{border-color:rgba(180,93,255,.48);box-shadow:0 0 28px rgba(180,93,255,.14),inset 0 0 26px rgba(37,177,255,.04)}
.object-head{display:grid;grid-template-columns:58px 1fr auto;gap:14px;align-items:center;margin-bottom:14px}
.object-icon{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:32px;background:rgba(37,142,255,.14);border:1px solid rgba(70,205,255,.40);box-shadow:0 0 22px rgba(33,178,255,.18)}
.object-title h2{font-size:27px;margin:0 0 6px}.object-title p{margin:0;color:#b8d8ee;font-size:13px}
.status-zone{display:flex;align-items:center;gap:9px}.status-badge{padding:10px 14px;border-radius:14px;background:rgba(53,243,132,.12);border:1px solid rgba(53,243,132,.35);font-weight:950;color:#d8ffe6}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.subcard{padding:14px;border-radius:18px;border:1px solid rgba(80,178,255,.24);background:rgba(5,15,35,.62);min-height:178px}
.subcard h3{display:flex;align-items:center;gap:9px;margin:0 0 12px;font-size:16px;color:#69eaff}
.row{display:grid;grid-template-columns:120px 1fr;gap:8px;margin:8px 0;color:#cfe6f5;font-size:13px}.row b{color:#fff}
.progress{height:10px;background:rgba(255,255,255,.11);border-radius:99px;overflow:hidden;border:1px solid rgba(92,181,255,.15);display:inline-block;width:120px;vertical-align:middle}.progress span{display:block;height:100%;background:linear-gradient(90deg,#168cff,#28eaff,#35f384);width:0;box-shadow:0 0 14px rgba(40,234,255,.35)}
.timeline{display:grid;gap:10px}.tline{display:grid;grid-template-columns:70px 1fr 20px;gap:8px;align-items:center;font-size:13px}.tline .q{color:#c8a6ff}.check{color:var(--green);font-weight:950}
.note-box{border-top:1px solid rgba(255,255,255,.08);padding-top:10px;color:#cfe6f5;font-size:13px;line-height:1.4}
.linklist{display:grid;gap:9px}.linkrow{display:grid;grid-template-columns:24px 1fr 24px;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px;color:#d8edfb}.linkrow a{color:#d8edfb}
.sidebar{display:flex;flex-direction:column;gap:12px}.acc{padding:16px;border-radius:20px;border:1px solid rgba(80,178,255,.24);background:rgba(5,15,35,.62)}.acc-head{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center}.acc h3{margin:0;font-size:16px}.acc small{display:block;color:#a8cbe4;margin-top:5px}.acc .state{color:var(--green);font-weight:900}.chev{color:#d8edfb;font-size:20px}.signal{justify-self:end}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px}.kpi{padding:18px;min-height:106px;display:grid;grid-template-columns:76px 1fr 120px;gap:14px;align-items:center}.kpi-ico{font-size:44px}.kpi h3{margin:0;color:var(--cyan);font-size:15px}.kpi b{font-size:30px}.kpi small{color:var(--muted);display:block}.spark{height:42px;width:100%;opacity:.95}
.spark svg{width:100%;height:100%}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20;place-items:center;padding:20px}.modal.show{display:grid}.modal-card{width:min(720px,94vw);max-height:90vh;overflow:auto;background:linear-gradient(145deg,#07152f,#030814);border:1px solid rgba(40,234,255,.45);border-radius:26px;box-shadow:0 0 50px rgba(40,234,255,.22);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field label{display:block;font-size:11px;letter-spacing:.055em;text-transform:uppercase;font-weight:900;color:#a8cbe4;margin:0 0 5px}
.toast{position:fixed;right:20px;bottom:20px;z-index:30;padding:12px 14px;border-radius:16px;background:#06152e;border:1px solid rgba(40,234,255,.45);box-shadow:0 0 28px rgba(40,234,255,.18);opacity:0;transform:translateY(10px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}
.hide{display:none!important}

.pilotage-board{display:grid;grid-template-columns:1.05fr .95fr 1fr;gap:12px;margin:0 0 14px}
.pilot-card{padding:14px;border-radius:18px;border:1px solid rgba(80,178,255,.24);background:rgba(5,15,35,.60);min-height:145px}
.pilot-card h3{margin:0 0 10px;color:#69eaff;font-size:15px;display:flex;gap:8px;align-items:center}
.roadmap-line{display:grid;grid-template-columns:82px 1fr auto;gap:9px;align-items:center;margin:8px 0;font-size:12px}
.road-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--cyan);box-shadow:0 0 10px rgba(40,234,255,.35)}
.road-dot.done{background:var(--green);border-color:var(--green)}.road-dot.todo{border-color:var(--muted2)}
.deploy-list{display:grid;gap:8px}.deploy-item{display:flex;justify-content:space-between;gap:8px;padding:8px;border-radius:12px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);font-size:12px}
.cahier{border-color:rgba(180,93,255,.38);background:linear-gradient(145deg,rgba(18,13,43,.60),rgba(5,15,35,.58))}
.cahier textarea{min-height:110px;margin-top:8px}
.side-small{font-size:12px;color:var(--muted);line-height:1.35}
.accordion-body{display:none;margin-top:10px;border-top:1px solid rgba(255,255,255,.08);padding-top:10px}
.acc.open .accordion-body{display:block}
.compact-right .acc{padding:13px 14px}
.compact-right .acc h3{font-size:15px}
.quick svg{display:block}


.central-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px;padding:10px;border-radius:20px;border:1px solid rgba(72,175,255,.24);background:rgba(3,12,28,.52)}
.central-tab{padding:10px 13px;border-radius:13px;border:1px solid rgba(89,190,255,.28);background:rgba(7,18,42,.78);font-weight:900;font-size:13px;color:#eaf8ff}
.central-tab.active{border-color:rgba(40,234,255,.82);background:linear-gradient(180deg,rgba(20,90,165,.8),rgba(42,17,94,.72));box-shadow:0 0 18px rgba(40,234,255,.18)}
.note-grid{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(310px,.85fr);gap:14px}
.note-form{display:grid;grid-template-columns:180px 1fr;gap:10px;margin-bottom:14px}
.note-form textarea{grid-column:1/-1;min-height:92px}
.note-list{display:grid;gap:9px;max-height:460px;overflow:auto;padding-right:4px}
.note-item{border:1px solid rgba(89,190,255,.22);background:rgba(5,15,35,.62);border-radius:16px;padding:12px;display:grid;grid-template-columns:28px 1fr auto;gap:9px;align-items:start}
.note-item.selected{border-color:rgba(53,243,132,.60);box-shadow:0 0 16px rgba(53,243,132,.12)}
.note-type{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;border:1px solid rgba(255,255,255,.14)}
.note-type.idée{border-color:rgba(53,243,132,.45);color:#d9ffe7}.note-type.commentaire{border-color:rgba(40,234,255,.45);color:#d8fbff}.note-type.problème{border-color:rgba(255,195,77,.55);color:#ffe2a5}.note-type.bug{border-color:rgba(255,100,114,.55);color:#ffc8cd}.note-type.décision{border-color:rgba(180,93,255,.50);color:#ebd5ff}.note-type.action{border-color:rgba(25,123,255,.55);color:#d7e8ff}
.prompt-box{min-height:310px;white-space:pre-wrap;font-size:13px;line-height:1.45;color:#dff7ff;background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:12px}
.prompt-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.view-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.view-title h2{margin:0;font-size:22px}


.roadmap-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.roadmap-board{display:grid;grid-template-columns:repeat(4,minmax(210px,1fr));gap:12px}
.road-col{border:1px solid rgba(80,178,255,.24);background:rgba(5,15,35,.58);border-radius:18px;padding:12px;min-height:360px}
.road-col h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;justify-content:space-between;gap:8px;color:#69eaff}
.road-count{font-size:11px;color:var(--muted);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px 7px}
.road-drop{display:grid;gap:9px;min-height:280px}
.road-card{border:1px solid rgba(89,190,255,.25);background:linear-gradient(135deg,rgba(9,31,69,.72),rgba(5,12,31,.76));border-radius:16px;padding:11px;box-shadow:0 0 14px rgba(28,143,255,.08);cursor:grab}
.road-card:active{cursor:grabbing}.road-card.dragging{opacity:.45;transform:scale(.98)}
.road-card h4{margin:0 0 7px;font-size:14px}.road-card p{margin:7px 0;color:#cfe6f5;font-size:12px;line-height:1.35}
.road-meta{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
.road-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.road-actions button{padding:6px 8px;border-radius:10px;font-size:11px}
.road-prio-haute{border-color:rgba(255,100,114,.45)!important}.road-prio-moyenne{border-color:rgba(255,195,77,.45)!important}.road-prio-basse{border-color:rgba(53,243,132,.36)!important}
.road-form{display:grid;grid-template-columns:1.2fr .7fr .7fr auto;gap:8px;margin:10px 0 14px}
.road-form textarea{grid-column:1/-1;min-height:62px}
.road-empty{border:1px dashed rgba(255,255,255,.14);border-radius:14px;padding:18px;text-align:center;color:var(--muted);font-size:12px}
.road-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.road-k{border:1px solid rgba(80,178,255,.22);background:rgba(5,15,35,.52);border-radius:15px;padding:10px}.road-k b{font-size:22px}.road-k small{display:block;color:var(--muted)}

.table-wrap{overflow:auto;border:1px solid rgba(80,178,255,.22);border-radius:16px;background:rgba(2,8,20,.28)}
.data-table{width:100%;border-collapse:collapse;min-width:920px;font-size:12px}
.data-table th,.data-table td{border-bottom:1px solid rgba(255,255,255,.075);padding:9px 8px;text-align:left;vertical-align:top}
.data-table th{position:sticky;top:0;background:rgba(7,20,44,.96);color:#8efaff;text-transform:uppercase;letter-spacing:.035em;font-size:11px;z-index:1}
.data-table tr:hover td{background:rgba(40,234,255,.035)}
.tiny-input,.tiny-select{padding:7px 8px;border-radius:10px;font-size:12px;min-width:120px}
.tiny-text{min-height:42px;padding:7px 8px;border-radius:10px;font-size:12px;min-width:210px}
.link-badge{display:inline-flex;gap:5px;align-items:center;border-radius:999px;padding:3px 7px;border:1px solid rgba(40,234,255,.32);background:rgba(40,234,255,.06);font-size:11px;color:#d8fbff;font-weight:800}
.table-tools{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px}
.table-note-linked{border-left:3px solid var(--green)}
.table-note-unlinked{border-left:3px solid var(--orange)}
.dual-view{display:grid;grid-template-columns:1fr;gap:12px}
.small-help{font-size:12px;color:var(--muted);line-height:1.4;margin:6px 0 10px}


.wide-note{position:fixed;left:12px;bottom:12px;z-index:10;font-size:11px;color:rgba(210,240,255,.55);pointer-events:none}
@media(min-width:1600px){.detail{min-width:0}.info-grid{gap:14px}.roadmap-board{gap:14px}}


.block-sheet{border:1px solid rgba(180,93,255,.42);background:linear-gradient(145deg,rgba(18,13,43,.62),rgba(5,15,35,.64));border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 0 24px rgba(180,93,255,.13)}
.block-sheet-head{display:grid;grid-template-columns:58px 1fr auto;gap:12px;align-items:center;margin-bottom:12px}
.block-sheet-ico{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:30px;border:1px solid rgba(40,234,255,.38);background:rgba(37,142,255,.14)}
.block-sheet h3{margin:0;font-size:22px}.block-sheet p{margin:5px 0 0;color:var(--muted)}
.block-form{display:grid;grid-template-columns:1.1fr .55fr .55fr .65fr;gap:10px;margin:10px 0}
.block-form textarea{grid-column:1/-1;min-height:95px}
.linked-notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.linked-note{border:1px solid rgba(89,190,255,.22);background:rgba(5,15,35,.56);border-radius:14px;padding:10px}
.linked-note h4{margin:0 0 6px;font-size:14px}.linked-note p{font-size:12px;line-height:1.35;color:#d8edfb;margin:6px 0}
.block-mini-note{display:grid;grid-template-columns:.6fr 1fr auto;gap:8px;margin-top:10px}
.block-mini-note textarea{grid-column:1/-1;min-height:60px}
.road-card.selected-road{border-color:rgba(53,243,132,.86)!important;box-shadow:0 0 26px rgba(53,243,132,.20),inset 0 0 16px rgba(53,243,132,.05)}
@media(max-width:980px){.block-form,.linked-notes-grid,.block-mini-note{grid-template-columns:1fr}.block-sheet-head{grid-template-columns:58px 1fr}.block-sheet-head .road-actions{grid-column:1/-1}}


/* V6.4I - Roadmap simplifiée */
.roadmap-simple{display:grid;gap:12px}
.road-strip{display:flex;gap:10px;overflow-x:auto;padding:10px;border-radius:18px;border:1px solid rgba(80,178,255,.24);background:rgba(2,8,20,.28)}
.road-chip-card{min-width:245px;max-width:310px;flex:0 0 245px;border:1px solid rgba(89,190,255,.25);background:linear-gradient(135deg,rgba(9,31,69,.74),rgba(5,12,31,.80));border-radius:16px;padding:11px;cursor:pointer;transition:.15s}
.road-chip-card:hover{transform:translateY(-2px);border-color:rgba(40,234,255,.65)}
.road-chip-card.active{border-color:rgba(53,243,132,.90);box-shadow:0 0 24px rgba(53,243,132,.18),inset 0 0 14px rgba(53,243,132,.05)}
.road-chip-card h4{margin:0 0 7px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.road-chip-card p{margin:6px 0 0;color:#cfe6f5;font-size:12px;line-height:1.35;max-height:34px;overflow:hidden}
.road-simple-sheet{border:1px solid rgba(180,93,255,.35);background:linear-gradient(145deg,rgba(18,13,43,.58),rgba(5,15,35,.64));border-radius:20px;padding:14px}
.road-simple-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.road-simple-head h3{margin:0;font-size:22px}
.road-simple-form{display:grid;grid-template-columns:minmax(260px,1.2fr) .55fr .55fr .65fr;gap:10px}
.road-simple-form textarea{grid-column:1/-1;min-height:95px}
.road-linked{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.road-linked-list{display:grid;gap:8px;max-height:220px;overflow:auto}
.road-linked-note{border:1px solid rgba(89,190,255,.20);background:rgba(5,15,35,.52);border-radius:13px;padding:9px}
.road-linked-note h4{font-size:13px;margin:0 0 5px}.road-linked-note p{font-size:12px;color:#d8edfb;margin:5px 0 0;line-height:1.32}
.road-list-bottom{border:1px solid rgba(80,178,255,.22);background:rgba(5,15,35,.52);border-radius:18px;padding:12px}
.road-list-bottom h3{margin:0 0 10px;color:#69eaff}
.road-list-row{display:grid;grid-template-columns:120px 95px 120px minmax(180px,1fr) 110px;gap:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.07);padding:8px 0;font-size:12px}
.road-list-row:last-child{border-bottom:0}.road-list-row.header{color:#8efaff;text-transform:uppercase;font-size:11px;font-weight:950;position:sticky;top:0;background:rgba(7,20,44,.95);z-index:2}
.road-new-line{display:grid;grid-template-columns:minmax(240px,1fr) 150px 130px 140px auto;gap:8px;margin:10px 0}
@media(max-width:1100px){.road-simple-form,.road-linked,.road-new-line,.road-list-row{grid-template-columns:1fr}.road-list-row.header{display:none}}


.zone-pills{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 12px}
.zone-pill{padding:8px 10px;border-radius:999px;border:1px solid rgba(89,190,255,.30);background:rgba(7,18,42,.72);font-size:12px;font-weight:950}
.zone-pill.active{border-color:rgba(53,243,132,.75);box-shadow:0 0 16px rgba(53,243,132,.14);color:#dfffe9}
.zone-editor{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;border-top:1px solid rgba(255,255,255,.08);padding-top:12px}
.zone-editor .field-full{grid-column:1/-1}
.inline-edit-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:10px 0}
.inline-edit-grid .full{grid-column:1/-1}
.inline-edit-grid label{display:block;font-size:11px;text-transform:uppercase;color:#a8cbe4;font-weight:900;margin-bottom:5px}
.zone-tag-perso{border-color:rgba(53,243,132,.48);color:#d9ffe7}
.zone-tag-proclients{border-color:rgba(180,93,255,.50);color:#ebd5ff}
.zone-tag-promerlet{border-color:rgba(40,234,255,.52);color:#d8fbff}
@media(max-width:760px){.zone-editor,.inline-edit-grid{grid-template-columns:1fr}}


/* V6.4K - Bandeau roadmap filtrable */
.road-filterbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border:1px solid rgba(80,178,255,.22);background:rgba(2,8,20,.26);border-radius:18px;padding:10px;margin-bottom:0}
.road-filter-left,.road-filter-right{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.road-filter-btn{border:1px solid rgba(89,190,255,.28);background:rgba(7,18,42,.72);border-radius:999px;color:#dff6ff;font-size:12px;font-weight:950;padding:8px 10px;cursor:pointer}
.road-filter-btn.active{border-color:rgba(53,243,132,.75);color:#dcffe8;box-shadow:0 0 16px rgba(53,243,132,.12)}
.road-strip.compact .road-chip-card:nth-child(n+7){display:none}
.road-strip.show-all .road-chip-card{display:block}
.road-strip-wrap{display:grid;gap:8px}
.road-status-sep{flex:0 0 100%;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#8efaff;font-weight:950;border-bottom:1px solid rgba(40,234,255,.18);padding:4px 0 2px;margin-top:2px}
.road-chip-card.status-a-traiter{border-color:rgba(120,190,255,.34)}
.road-chip-card.status-en-cours{border-color:rgba(255,195,77,.56)}
.road-chip-card.status-validation{border-color:rgba(180,93,255,.58)}
.road-chip-card.status-valide{border-color:rgba(53,243,132,.48);opacity:.86}
.road-chip-card.status-valide h4:before{content:"✓ ";color:#35f384}
.road-muted-note{font-size:12px;color:var(--muted);padding:0 4px}


/* V6.4L - Roadmap objets visibles */
.road-object-zone{border:1px solid rgba(80,178,255,.24);background:rgba(2,8,20,.26);border-radius:20px;padding:12px;display:grid;gap:10px}
.road-object-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.road-object-head h3{margin:0;color:#8efaff;font-size:18px}
.road-object-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;align-items:stretch}
.road-object-card{min-height:145px;border:1px solid rgba(89,190,255,.28);background:linear-gradient(145deg,rgba(9,31,69,.82),rgba(5,12,31,.86));border-radius:18px;padding:13px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.road-object-card:after{content:"";position:absolute;right:-44px;top:-44px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(40,234,255,.16),transparent 65%);pointer-events:none}
.road-object-card:hover{transform:translateY(-2px);border-color:rgba(40,234,255,.70);box-shadow:0 0 22px rgba(40,234,255,.12)}
.road-object-card.active{border-color:rgba(53,243,132,.92);box-shadow:0 0 25px rgba(53,243,132,.20),inset 0 0 16px rgba(53,243,132,.06)}
.road-object-card h4{margin:0 0 8px;font-size:16px;line-height:1.15;position:relative}
.road-object-card p{margin:9px 0 0;color:#d8edfb;font-size:12px;line-height:1.36;max-height:50px;overflow:hidden;position:relative}
.road-object-status{display:flex;gap:6px;flex-wrap:wrap;position:relative}
.road-object-card.status-a-traiter{border-left:4px solid rgba(120,190,255,.80)}
.road-object-card.status-en-cours{border-left:4px solid rgba(255,195,77,.92)}
.road-object-card.status-validation{border-left:4px solid rgba(180,93,255,.92)}
.road-object-card.status-valide{border-left:4px solid rgba(53,243,132,.84);opacity:.78}
.road-object-card.status-valide h4:before{content:"✓ ";color:#35f384}
.road-object-empty{border:1px dashed rgba(255,255,255,.14);border-radius:16px;padding:24px;text-align:center;color:var(--muted);grid-column:1/-1}
.road-validated-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:6px;padding-top:10px;border-top:1px solid rgba(53,243,132,.18)}
.road-validated-mini{border:1px solid rgba(53,243,132,.24);background:rgba(53,243,132,.045);border-radius:13px;padding:8px;font-size:12px;cursor:pointer;color:#dfffe9}
.road-main-note{color:var(--muted);font-size:12px;margin:0}
.road-filterbar{margin-bottom:0}
.road-filter-btn.primary{border-color:rgba(40,234,255,.60);color:#d8fbff}


.snapshot-rule{border:1px solid rgba(53,243,132,.34);background:rgba(53,243,132,.055);border-radius:16px;padding:12px;margin:10px 0}
.snapshot-rule h3{margin:0 0 8px;color:#dfffe9}
.snapshot-rule-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.snapshot-rule-card{border:1px solid rgba(255,255,255,.10);background:rgba(2,8,20,.30);border-radius:13px;padding:9px}
.snapshot-rule-card b{display:block;color:#8efaff}.snapshot-rule-card small{color:var(--muted)}
@media(max-width:900px){.snapshot-rule-grid{grid-template-columns:1fr}}


.auto-snapshot-badge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(40,234,255,.38);background:rgba(40,234,255,.06);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:950;color:#d8fbff}
.auto-snapshot-badge.off{border-color:rgba(255,195,77,.45);color:#ffe2a5;background:rgba(255,195,77,.06)}


.input-safe-badge{display:inline-flex;gap:6px;align-items:center;border:1px solid rgba(53,243,132,.42);background:rgba(53,243,132,.06);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:950;color:#dfffe9}


/* V6.4P - Données / Sync réel & lisible */
.sync-dashboard{display:grid;gap:12px}
.sync-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.sync-card{border:1px solid rgba(80,178,255,.24);background:rgba(5,15,35,.58);border-radius:16px;padding:12px;min-height:104px;position:relative;overflow:hidden}
.sync-card:after{content:"";position:absolute;right:-34px;top:-34px;width:94px;height:94px;border-radius:50%;background:radial-gradient(circle,rgba(40,234,255,.12),transparent 68%);pointer-events:none}
.sync-card b{display:block;font-size:22px;color:#f5fbff;margin:3px 0}
.sync-card small{display:block;color:var(--muted);line-height:1.35}
.sync-card.ok{border-color:rgba(53,243,132,.38)}
.sync-card.warn{border-color:rgba(255,195,77,.46)}
.sync-card.bad{border-color:rgba(255,100,114,.48)}
.sync-section{border:1px solid rgba(80,178,255,.22);background:rgba(2,8,20,.26);border-radius:18px;padding:14px}
.sync-section h3{margin:0 0 10px;color:#8efaff}
.sync-table{width:100%;border-collapse:collapse;font-size:12px}
.sync-table td,.sync-table th{border-bottom:1px solid rgba(255,255,255,.075);padding:8px;text-align:left;vertical-align:top}
.sync-table th{color:#8efaff;text-transform:uppercase;font-size:11px;letter-spacing:.04em}
.sync-status{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 8px;border:1px solid rgba(255,255,255,.14);font-size:12px;font-weight:950}
.sync-status.ok{border-color:rgba(53,243,132,.42);color:#dfffe9;background:rgba(53,243,132,.06)}
.sync-status.warn{border-color:rgba(255,195,77,.45);color:#ffe2a5;background:rgba(255,195,77,.06)}
.sync-status.bad{border-color:rgba(255,100,114,.45);color:#ffd5da;background:rgba(255,100,114,.06)}
.sync-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sync-code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;color:#d8fbff;word-break:break-all}
.sync-two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:1100px){.sync-grid{grid-template-columns:repeat(2,1fr)}.sync-two{grid-template-columns:1fr}}
@media(max-width:760px){.sync-grid{grid-template-columns:1fr}}


.sync-truth-warning{border:1px solid rgba(255,195,77,.45);background:rgba(255,195,77,.065);border-radius:16px;padding:12px;color:#ffe9b8}
.sync-truth-warning b{color:#fff4cc}
.sync-mini-note{font-size:11px;color:var(--muted);line-height:1.35;margin-top:5px}


.drive-real-panel{border:1px solid rgba(53,243,132,.38);background:rgba(53,243,132,.055);border-radius:18px;padding:14px}
.drive-real-panel h3{margin:0 0 10px;color:#dfffe9}
.drive-file-list{display:grid;gap:7px;max-height:260px;overflow:auto;margin-top:8px}
.drive-file-row{display:grid;grid-template-columns:90px minmax(180px,1fr) 150px 90px;gap:8px;align-items:center;border:1px solid rgba(255,255,255,.08);background:rgba(2,8,20,.24);border-radius:12px;padding:8px;font-size:12px}
.drive-file-row b{word-break:break-all}
.drive-kind{border-radius:999px;padding:4px 7px;font-size:11px;font-weight:950;border:1px solid rgba(255,255,255,.14);text-align:center}
.drive-kind.current{border-color:rgba(53,243,132,.42);color:#dfffe9}.drive-kind.snapshot{border-color:rgba(180,93,255,.45);color:#ebd5ff}.drive-kind.json{border-color:rgba(255,195,77,.42);color:#ffe2a5}
@media(max-width:900px){.drive-file-row{grid-template-columns:1fr}}


/* V6.4S - Drive réel raccordé aux modules */
.drive-mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:8px 0}
.drive-mini-card{border:1px solid rgba(80,178,255,.22);background:rgba(2,8,20,.32);border-radius:13px;padding:9px}
.drive-mini-card b{display:block;font-size:20px;color:#f5fbff}.drive-mini-card small{display:block;color:var(--muted);font-size:11px;line-height:1.3}
.drive-alert{border:1px solid rgba(255,195,77,.42);background:rgba(255,195,77,.055);border-radius:13px;padding:8px;margin:8px 0;color:#ffe8ad;font-size:12px}
.drive-alert.bad{border-color:rgba(255,100,114,.45);background:rgba(255,100,114,.055);color:#ffd5da}
.drive-ok{border:1px solid rgba(53,243,132,.35);background:rgba(53,243,132,.055);border-radius:13px;padding:8px;margin:8px 0;color:#dfffe9;font-size:12px}
.drive-real-inline{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:8px}
.drive-real-inline .pill{font-size:11px}


/* V6.4T - Avancement estimé projet */
.progress-estimate-panel{border:1px solid rgba(40,234,255,.30);background:linear-gradient(135deg,rgba(40,234,255,.065),rgba(180,93,255,.045));border-radius:18px;padding:14px;margin:10px 0}
.progress-estimate-panel h3{margin:0 0 10px;color:#8efaff}
.progress-score-big{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.progress-ring{width:118px;height:118px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(rgba(40,234,255,.88) var(--pct),rgba(255,255,255,.08) 0);box-shadow:0 0 22px rgba(40,234,255,.18);position:relative}
.progress-ring:before{content:"";position:absolute;inset:12px;border-radius:50%;background:rgba(3,8,18,.96);border:1px solid rgba(255,255,255,.10)}
.progress-ring b{position:relative;font-size:25px;color:#f5fbff}
.progress-breakdown{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}
.progress-factor{border:1px solid rgba(255,255,255,.10);background:rgba(2,8,20,.34);border-radius:14px;padding:10px}
.progress-factor b{display:block;font-size:18px;color:#fff}.progress-factor small{display:block;color:var(--muted);line-height:1.35}
.progress-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin:7px 0}
.progress-bar span{display:block;height:100%;width:var(--w);background:linear-gradient(90deg,rgba(40,234,255,.9),rgba(53,243,132,.75))}
.progress-explain{font-size:12px;color:var(--muted);line-height:1.45;margin-top:9px}
.progress-mini{border:1px solid rgba(40,234,255,.22);background:rgba(40,234,255,.045);border-radius:13px;padding:9px;margin:8px 0}
.progress-mini b{font-size:21px;color:#f5fbff}.progress-mini small{display:block;color:var(--muted)}
@media(max-width:1100px){.progress-breakdown{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.progress-breakdown{grid-template-columns:1fr}.progress-ring{width:96px;height:96px}}


/* V6.4U - Avancement détaillé + ruban droit modulable */
.progress-detail-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
.progress-detail-table th,.progress-detail-table td{border-bottom:1px solid rgba(255,255,255,.08);padding:8px;text-align:left;vertical-align:top}
.progress-detail-table th{color:#8efaff;text-transform:uppercase;font-size:11px;letter-spacing:.04em}
.progress-formula{border:1px solid rgba(40,234,255,.24);background:rgba(40,234,255,.045);border-radius:14px;padding:10px;margin-top:10px;font-size:12px;color:var(--muted);line-height:1.5}
.progress-chipline{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.progress-chip{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.045);border-radius:999px;padding:5px 8px;font-size:11px;font-weight:900;color:#eafaff}
.right-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 10px}
.acc[draggable="true"]{cursor:grab}
.acc.dragging{opacity:.55;outline:2px dashed rgba(40,234,255,.55)}
.acc.drop-target{box-shadow:0 0 0 2px rgba(53,243,132,.35),0 0 24px rgba(53,243,132,.16)}
.drag-handle{font-size:14px;opacity:.75;cursor:grab;user-select:none}
.acc.collapsed .accordion-body{display:none}
.acc.collapsed .chev{transform:rotate(-90deg)}
.acc-head{user-select:none}


/* V6.4V - Correctif détail avancement + ruban droit */
.right-compact-toolbar{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0 9px}
.right-compact-toolbar .tiny-btn,.tiny-btn{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.045);color:#eafaff;border-radius:9px;padding:4px 6px;font-size:11px;font-weight:850;cursor:pointer}
.tiny-btn:hover{border-color:rgba(40,234,255,.42);background:rgba(40,234,255,.08)}
.acc.mod{position:relative}
.acc.mod .acc-head{display:grid;grid-template-columns:22px 28px minmax(0,1fr) auto;gap:7px;align-items:center;padding:9px 10px}
.acc.mod .acc-head h3{margin:0;font-size:13px}
.acc.mod .acc-head small{font-size:10.5px;line-height:1.25}
.acc-actions{display:flex;gap:4px;align-items:center}
.drag-grip{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.035);font-size:13px;cursor:grab;user-select:none}
.drag-grip:active{cursor:grabbing}
.acc.mod.collapsed .accordion-body{display:none}
.acc.mod.collapsed .toggle-mark{transform:rotate(-90deg)}
.acc.mod.dragging{opacity:.48;outline:2px dashed rgba(40,234,255,.55)}
.acc.mod.drop-before{box-shadow:0 -3px 0 rgba(53,243,132,.8)}
.acc.mod.drop-after{box-shadow:0 3px 0 rgba(53,243,132,.8)}
.cahier-large-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);display:grid;place-items:center;padding:24px}
.cahier-large-box{width:min(980px,94vw);height:min(760px,90vh);border:1px solid rgba(40,234,255,.34);background:linear-gradient(145deg,rgba(7,15,35,.98),rgba(12,6,28,.98));border-radius:24px;box-shadow:0 30px 90px rgba(0,0,0,.55),0 0 60px rgba(40,234,255,.12);display:flex;flex-direction:column;overflow:hidden}
.cahier-large-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.10)}
.cahier-large-head h2{margin:0;font-size:18px;color:#eafaff}
.cahier-large-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:10px}
.cahier-large-body textarea{flex:1;min-height:420px;font-size:14px;line-height:1.55}
.detail-visible-note{border:1px solid rgba(53,243,132,.35);background:rgba(53,243,132,.055);border-radius:14px;padding:9px;margin:8px 0;color:#dfffe9;font-size:12px}
.right-mini-note{font-size:10.5px;color:var(--muted);line-height:1.35;margin-top:5px}


/* V6.4W - correction liaison roadmap / avancement */
.road-link-debug{border:1px solid rgba(255,195,77,.30);background:rgba(255,195,77,.045);border-radius:12px;padding:8px;margin-top:8px;font-size:11px;color:#ffe8ad;line-height:1.35}


/* V6.4X - diagnostic liaison roadmap score */
.road-score-debug-panel{border:1px solid rgba(255,195,77,.32);background:rgba(255,195,77,.045);border-radius:14px;padding:10px;margin-top:10px}
.road-score-debug-panel h4{margin:0 0 8px;color:#ffe2a5}
.road-score-list{display:grid;gap:6px;max-height:230px;overflow:auto}
.road-score-row{display:grid;grid-template-columns:46px 1fr 110px 76px;gap:7px;align-items:center;border:1px solid rgba(255,255,255,.08);background:rgba(2,8,20,.24);border-radius:10px;padding:7px;font-size:11px}
.road-score-row.ok{border-color:rgba(53,243,132,.28)}
.road-score-row.no{opacity:.62}
.road-score-badge{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:3px 6px;text-align:center;font-weight:900}

function getSnapshots(){const all=[];[SNAP_KEY,...PREVIOUS_SNAP_KEYS].filter((v,i,a)=>v&&a.indexOf(v)===i).forEach(k=>{try{const arr=JSON.parse(localStorage.getItem(k)||'[]');if(Array.isArray(arr))arr.forEach(x=>all.push(Object.assign({sourceKey:k},x)))}catch(e){}});const seen=new Set();return all.filter(x=>{const sig=(x.date||'')+'|'+(x.action||'')+'|'+(x.payload?.version||'');if(seen.has(sig))return false;seen.add(sig);return true}).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,SNAPSHOT_RETENTION_MAX)}
function pruneSnapshots(max=SNAPSHOT_RETENTION_MAX){try{const snaps=getSnapshots().slice(0,max);localStorage.setItem(SNAP_KEY,JSON.stringify(snaps));toast('Snapshots limités aux '+max+' derniers');renderAll()}catch(e){toast('Purge impossible')}}

function saveSnapshot(action='snapshot manuel',force=false){
  try{
    if(!force && !isImportantSnapshotAction(action))return null;
    const snaps=getSnapshots();
    const payload=currentPayload(action);
    const snap={date:now(),action,payload};
    snaps.unshift(snap);
    localStorage.setItem(SNAP_KEY,JSON.stringify(snaps.slice(0,SNAPSHOT_RETENTION_MAX)));
    return snap;
  }catch(e){return null}
}

function buildSyncPayload(action='manual',mode='current'){
  const isSnapshot=mode==='snapshot';
  return {
    app:'Cockpit Projets BI',
    version:VERSION,
    action,
    mode,
    exported_at:now(),
    filename:isSnapshot?'SNAPSHOT_Cockpit_Projets_BI_'+VERSION+'_'+new Date().toISOString().replace(/[:.]/g,'-')+'.json':CURRENT_SYNC_FILENAME,
    state,
    meta:{url:location.href,storageKey:KEY,projects:state.projects.length,retention:SNAPSHOT_RETENTION_MAX}
  }
}
function queueDriveCurrentSync(action='auto'){
  clearTimeout(autoSyncTimer);
  autoSyncTimer=setTimeout(()=>sendDriveSync(action,true,'current'),AUTO_SYNC_DEBOUNCE_MS);
  setDriveConfig({queued:true,lastAction:action,lastMode:'current',lastStatus:'Sync courante en attente'});
}
async function sendDriveSync(action='manual',silent=false,mode='current'){
  const cfg=getDriveConfig();if(!cfg.endpoint){if(!silent)configureDriveSync();return}
  const payload=buildSyncPayload(action,mode);
  try{
    await fetch(cfg.endpoint,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    setDriveConfig({lastSent:now(),lastStatus:mode==='snapshot'?'Snapshot envoyé':'État courant envoyé',lastAction:action,lastMode:mode,queued:false,enabled:true});
    if(!silent){toast(mode==='snapshot'?'Snapshot envoyé vers Drive':'État courant envoyé vers Drive');safeRenderAll()}
  }catch(e){setDriveConfig({lastStatus:'Erreur envoi',lastAction:action,queued:false});if(!silent)toast('Erreur Drive Sync')}
}
function sendDriveSnapshot(){const snap=createSnapshotManual();sendDriveSync('snapshot manuel drive',false,'snapshot')}
function shouldAutoSnapshotDrive(reason){
  const cfg=getDriveConfig();
  if(!cfg.enabled || !cfg.endpoint)return false;
  const last=Number(localStorage.getItem(AUTO_SNAPSHOT_LAST_KEY)||0);
  const elapsed=Date.now()-last;
  if(elapsed<AUTO_SNAPSHOT_COOLDOWN_MS){
    toast('Snapshot auto ignoré : sécurité anti-spam active');
    return false;
  }
  return true;
}
function autoSnapshotDrive(reason){
  if(!shouldAutoSnapshotDrive(reason))return;
  saveSnapshot('auto '+reason,true);
  localStorage.setItem(AUTO_SNAPSHOT_LAST_KEY,String(Date.now()));
  sendDriveSync('auto '+reason,true,'snapshot');
  toast('Snapshot auto Drive : '+reason);
}
function forceAutoSnapshotDrive(reason='snapshot auto test manuel'){
  saveSnapshot(reason,true);
  localStorage.setItem(AUTO_SNAPSHOT_LAST_KEY,String(Date.now()));
  sendDriveSync(reason,false,'snapshot');
}

function roadStatusKey(s){
  return String(s||'À traiter').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-');
}
function roadStatusRank(s){
  const order={'À traiter':1,'En cours':2,'Validation':3,'Validé':4};
  return order[s]||9;
}
function sortedRoadBlocks(blocks){
  return [...(blocks||[])].sort((a,b)=>{
    const r=roadStatusRank(a.status)-roadStatusRank(b.status);
    if(r!==0)return r;
    const p={'Haute':1,'Moyenne':2,'Basse':3};
    return (p[a.priority]||9)-(p[b.priority]||9);
  });
}
function filteredRoadBlocks(blocks){
  let out=sortedRoadBlocks(blocks);
  if(roadmapFilter==='actifs')out=out.filter(b=>b.status!=='Validé');
  else if(roadmapFilter!=='tous')out=out.filter(b=>b.status===roadmapFilter);
  return out;
}

function bytesLabel(n){
  n=Number(n)||0;
  if(n<1024)return n+' o';
  if(n<1024*1024)return (n/1024).toFixed(1)+' Ko';
  return (n/1024/1024).toFixed(2)+' Mo';
}
function fmtLocalDateTime(value){
  if(!value || value==='—')return '—';
  try{
    const d=new Date(value);
    if(isNaN(d.getTime()))return String(value);
    return d.toLocaleString('fr-FR',{dateStyle:'short',timeStyle:'medium'});
  }catch(e){return String(value)}
}
function fmtIsoInfo(value){
  if(!value || value==='—')return '—';

function storageSize(key){
  try{return (localStorage.getItem(key)||'').length}catch(e){return 0}

function driveEndpointMasked(endpoint){
  if(!endpoint)return 'Non renseigné';
  const s=String(endpoint);
  return s.length>46?s.slice(0,32)+'…'+s.slice(-12):s;
}
function buildSyncDiagnostics(){
  const cfg=getDriveConfig();
  const snaps=getSnapshots();
  const endpointOk=!!cfg.endpoint;
  const enabledOk=!!cfg.enabled;
  const currentLocalSize=storageSize(CURRENT_KEY);
  const activeSize=storageSize(KEY);
  const lastSent=cfg.lastSent||'—';
  const lastSentLocal=fmtLocalDateTime(lastSent);
  const lastMode=cfg.lastMode||'current';
  const selectedProject=selected();
  const hasProjects=Array.isArray(state.projects)&&state.projects.length>0;
  const currentSaved=!!localStorage.getItem(CURRENT_KEY);
  const lastAuto = typeof lastAutoSnapshotLabel==='function' ? lastAutoSnapshotLabel() : '—';
  const endpointDisplay=driveEndpointMasked(cfg.endpoint);
  return {cfg,snaps,endpointOk,enabledOk,currentLocalSize,activeSize,lastSent,lastSentLocal,lastMode,selectedProject,hasProjects,currentSaved,lastAuto,endpointDisplay};
}

let driveDiagnostic=null;
let driveDiagnosticLoading=false;
function getDriveDiagnosticUrl(){
  const cfg=getDriveConfig();
  if(!cfg.endpoint)return '';
  return cfg.endpoint+(cfg.endpoint.includes('?')?'&':'?')+'action=diagnostic';
}
function fetchDriveDiagnostic(){
  const cfg=getDriveConfig();
  if(!cfg.endpoint){toast('Endpoint Drive non configuré');return}
  driveDiagnosticLoading=true;renderAll();
  const cb='biDriveDiag_'+Date.now()+'_'+Math.floor(Math.random()*100000);
  window[cb]=function(data){
    driveDiagnosticLoading=false;driveDiagnostic=data;
    try{delete window[cb]}catch(e){window[cb]=undefined}
    toast(data&&data.ok?'Diagnostic Drive réel reçu':'Diagnostic Drive en erreur');
    renderAll();
  };
  const s=document.createElement('script');
  s.src=getDriveDiagnosticUrl()+'&callback='+cb+'&t='+Date.now();
  s.onerror=function(){driveDiagnosticLoading=false;toast('Erreur lecture diagnostic Drive');try{delete window[cb]}catch(e){window[cb]=undefined}renderAll()};
  document.body.appendChild(s);
  setTimeout(()=>{try{s.remove()}catch(e){}},30000);
}

function clampPct(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)))}
function statusScore(status){
  const s=String(status||'').toLowerCase();
  if(s.includes('validé')||s.includes('valide'))return 100;
  if(s.includes('validation'))return 80;
  if(s.includes('cours'))return 50;
  if(s.includes('traiter'))return 20;
  if(s.includes('idée')||s.includes('idee')||s.includes('brouillon'))return 10;
  return 25;
}

function normKey(v){
  return String(v||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function roadStatusScore(status){
  const s=normKey(status);
  if(s.includes('valide') || s.includes('termine') || s.includes('fait') || s.includes('done'))return 1;
  if(s.includes('validation') || s.includes('test') || s.includes('recette'))return .8;
  if(s.includes('cours') || s.includes('progress') || s.includes('traitement'))return .5;
  if(s.includes('bloque'))return .25;
  return 0;
}
function possibleProjectRefs(p){
  if(!p)return [];
  return [p.id,p.uid,p.key,p.slug,p.name,p.title,p.label,normKey(p.name),normKey(p.title),normKey(p.label)]
    .filter(v=>v!==undefined&&v!==null&&String(v).trim()!=='').map(v=>String(v));
}
function possibleBlockProjectRefs(b){
  if(!b)return [];
  return [
    b.projectId,b.project_id,b.project,b.projectKey,b.projectName,b.projectLabel,
    b.parentProjectId,b.parentId,b.ownerProjectId,b.owner,
    b.bi,b.biId,b.biName,b.scope,b.linkedProject,b.projectRef,b.refProject
  ].filter(v=>v!==undefined&&v!==null&&String(v).trim()!=='').map(v=>String(v));
}
function roadBlockHasExplicitProjectRef(b){
  return possibleBlockProjectRefs(b).length>0;
}
function textMentionsProject(b,p){
  const pn=normKey(p.name||p.title||'');
  if(!pn)return false;
  const hay=normKey([b.title,b.name,b.text,b.description,b.notes,b.projectName,b.project,b.scope].join(' '));
  return hay.includes(pn) || (hay.length>8 && pn.includes(hay));
}
function isCurrentProjectRoadBlock(b,p){
  if(!b||!p)return false;
  const pRefs=possibleProjectRefs(p);
  const bRefs=possibleBlockProjectRefs(b);
  if(pRefs.some(pr=>bRefs.some(br=>String(br)===String(pr))))return true;
  if(pRefs.some(pr=>bRefs.some(br=>normKey(br)===normKey(pr))))return true;
  if(textMentionsProject(b,p))return true;
  if(Array.isArray(p.roadmapIds) && p.roadmapIds.map(String).includes(String(b.id)))return true;
  if(Array.isArray(p.roadIds) && p.roadIds.map(String).includes(String(b.id)))return true;
  return false;
}
function roadmapLinkMode(p,linked,all){
  if(linked.length)return 'liens explicites détectés';
  const explicitRefs=all.filter(roadBlockHasExplicitProjectRef).length;
  if(all.length && explicitRefs===0)return 'fallback : roadmap globale sans champ projet';
  if(all.length && normKey(p?.name).includes('bi gestion projets bi'))return 'fallback : projet cockpit actif';
  return 'aucun lien fiable';
}
function projectRoadBlocks(projectId){
  const p=selected();
  const all=Array.isArray(state.roadmap)?state.roadmap:[];
  if(!all.length)return [];
  let linked=all.filter(b=>isCurrentProjectRoadBlock(b,p));
  const mode=roadmapLinkMode(p,linked,all);
  if(!linked.length && mode.includes('fallback')) linked=all.slice();
  return linked;
}
function projectRoadBlocksDiagnostic(p){
  const all=Array.isArray(state.roadmap)?state.roadmap:[];
  const explicit=all.filter(b=>isCurrentProjectRoadBlock(b,p));
  const mode=roadmapLinkMode(p,explicit,all);
  const used=explicit.length?explicit:(mode.includes('fallback')?all:[]);
  const usedIds=new Set(used.map(b=>String(b.id)));
  return {all,explicit,used,mode,usedIds};
}
function roadBlockLinkDebug(p,blocks){
  const d=projectRoadBlocksDiagnostic(p);
  if(blocks.length)return `${blocks.length}/${d.all.length} blocs roadmap pris en compte · ${d.mode}`;
  return `0/${d.all.length} bloc pris en compte · ${d.mode}`;
}
function renderRoadmapScoreDiagnostic(p){
  const d=projectRoadBlocksDiagnostic(p);
  const rows=d.all.slice(0,40).map(b=>{
    const used=d.usedIds.has(String(b.id));
    const refs=possibleBlockProjectRefs(b).join(' · ') || 'aucune référence projet';
    return `<div class="road-score-row ${used?'ok':'no'}">
      <span class="road-score-badge ${used?'ok':'no'}">${used?'pris':'ignoré'}</span>
      <div><b>${esc(b.title||b.name||'Bloc sans titre')}</b><br><small>${esc(refs)}</small></div>
      <span>${esc(b.status||'—')}</span>
      <span>${Math.round(roadStatusScore(b.status)*100)}%</span>
    </div>`;
  }).join('');
  return `<div class="road-score-debug-panel">
    <h4>Diagnostic liaison roadmap</h4>
    <div class="progress-explain">Mode : <b>${esc(d.mode)}</b> · utilisés : <b>${d.used.length}/${d.all.length}</b>. Si les blocs n’ont aucun champ projet, le BI considère la roadmap comme globale pour ce cockpit.</div>
    <div class="road-score-list">${rows||'<div class="muted">Aucun bloc roadmap dans state.roadmap.</div>'}</div>
  </div>`;
}
function estimateDocumentationScore(p){
  let score=0, detail=[];
  const notes=(state.notes||[]).filter(n=>String(n.projectId||'')===String(p.id)||String(n.project||'')===String(p.id)||String(n.projectName||'')===String(p.name));
  if(notes.length>0){score+=40;detail.push('notes présentes')}
  const hasText=(String(p.desc||p.description||p.notes||'').trim().length>20);
  if(hasText){score+=25;detail.push('description renseignée')}
  const hasLinks=!!(p.driveUrl||p.githubUrl||p.url||p.gptUrl||p.links);
  if(hasLinks){score+=35;detail.push('liens projet renseignés')}
  return {score:clampPct(score),detail:detail.length?detail.join(' · '):'peu de documentation détectée'};
}
function estimateSyncScore(){
  const cfg=getDriveConfig();
  const s=driveRealSummary ? driveRealSummary() : {available:false};
  let score=0, detail=[];
  if(cfg.endpoint){score+=20;detail.push('endpoint configuré')}
  if(cfg.enabled){score+=15;detail.push('sync activée')}
  if(s.available){
    if(Number(s.current)===1){score+=30;detail.push('CURRENT Drive OK')}
    else if(Number(s.current)>1){score+=10;detail.push('doublon CURRENT')}
    if(Number(s.snapshots)>0){score+=20;detail.push('snapshots Drive présents')}
    if(!s.duplicate&&!s.overRetention){score+=15;detail.push('aucune alerte Drive')}
  }else{
    if((cfg.lastMode||'')==='current'){score+=10;detail.push('dernier mode current local')}
    detail.push('Drive réel non lu');
  }
  return {score:clampPct(score),detail:detail.join(' · ')||'sync non configurée'};
}
function estimateProjectProgress(p){
  if(!p)return null;
  const blocks=projectRoadBlocks(p.id);
  let roadScore=0, roadDetail=roadBlockLinkDebug(p,[]);
  if(blocks.length){
    const total=blocks.reduce((a,b)=>a+roadStatusScore(b.status),0);
    roadScore=clampPct((total/blocks.length)*100);
    const valid=blocks.filter(b=>roadStatusScore(b.status)>=1).length;
    const validation=blocks.filter(b=>String(b.status||'').toLowerCase().includes('validation')).length;
    roadDetail=`${blocks.length} blocs liés · ${valid} validés · ${validation} en validation`;
  }
  const statScore=clampPct(statusScore(p.status));
  const sync=estimateSyncScore();
  const doc=estimateDocumentationScore(p);
  const final=clampPct(roadScore*.40 + statScore*.25 + sync.score*.20 + doc.score*.15);
  const manual=Number(p.progress||p.avancement||0);
  return {
    final, manual:clampPct(manual),
    road:{score:roadScore,weight:40,detail:roadDetail},
    status:{score:statScore,weight:25,detail:p.status||'statut inconnu'},
    sync:{score:sync.score,weight:20,detail:sync.detail},
    doc:{score:doc.score,weight:15,detail:doc.detail}
  };
}

function progressContribution(score,weight){return Math.round((Number(score)||0)*(Number(weight)||0)/100)}

function initRightDragDrop(){
  const rail=document.querySelector('.right-rail');
  if(!rail)return;
  let sourceId=null;
  rail.querySelectorAll('.drag-grip[data-drag-id]').forEach(handle=>{
    handle.addEventListener('dragstart',ev=>{
      sourceId=handle.dataset.dragId;
      const card=handle.closest('[data-right-block]');
      card?.classList.add('dragging');
      ev.dataTransfer.effectAllowed='move';
      ev.dataTransfer.setData('text/plain',sourceId);
    });
    handle.addEventListener('dragend',()=>{
      rail.querySelectorAll('.dragging,.drop-before,.drop-after').forEach(x=>x.classList.remove('dragging','drop-before','drop-after'));
    });
  });
  rail.querySelectorAll('[data-right-block]').forEach(card=>{
    card.addEventListener('dragover',ev=>{
      ev.preventDefault();
      const rect=card.getBoundingClientRect();
      card.classList.toggle('drop-before', ev.clientY < rect.top + rect.height/2);
      card.classList.toggle('drop-after', ev.clientY >= rect.top + rect.height/2);
    });
    card.addEventListener('dragleave',()=>card.classList.remove('drop-before','drop-after'));
    card.addEventListener('drop',ev=>{
      ev.preventDefault();
      const targetId=card.dataset.rightBlock;
      const source=sourceId||ev.dataTransfer.getData('text/plain');
      const after=card.classList.contains('drop-after');
      rail.querySelectorAll('.drop-before,.drop-after,.dragging').forEach(x=>x.classList.remove('drop-before','drop-after','dragging'));
      if(!source||!targetId||source===targetId)return;
      const order=getRightOrder().filter(x=>x!==source);
      let idx=order.indexOf(targetId);
      if(after)idx++;
      order.splice(idx,0,source);
      setRightOrder(order);
      renderAll();
    });
  });
}

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove('show'),2300)}

function isFormLike(el){
  return el && ['INPUT','TEXTAREA','SELECT'].includes(el.tagName);
}
function captureUiDrafts(){
  try{
    uiDrafts={};
    document.querySelectorAll('input[id],textarea[id],select[id]').forEach(el=>{
      uiDrafts[el.id]=el.value;
    });
    const a=document.activeElement;
    if(isFormLike(a) && a.id){
      uiRestoreFocus={id:a.id,start:a.selectionStart||0,end:a.selectionEnd||0};
    }else{
      uiRestoreFocus=null;
    }
  }catch(e){}
}
function restoreUiDrafts(){
  try{
    Object.entries(uiDrafts||{}).forEach(([id,val])=>{
      const el=document.getElementById(id);
      if(el && el.value!==val)el.value=val;
    });
    if(uiRestoreFocus && uiRestoreFocus.id){
      const el=document.getElementById(uiRestoreFocus.id);
      if(el){
        el.focus({preventScroll:true});
        if(typeof el.setSelectionRange==='function'){
          const len=String(el.value||'').length;
          const s=Math.min(uiRestoreFocus.start,len), e=Math.min(uiRestoreFocus.end,len);
          el.setSelectionRange(s,e);
        }
      }
    }
  }catch(e){}
}
function safeRenderAll(){
  captureUiDrafts();
  renderAll();
  setTimeout(restoreUiDrafts,0);
}
function scheduleSoftRender(){
  if(isFormLike(document.activeElement)){
    captureUiDrafts();
    setTimeout(()=>{ if(!isFormLike(document.activeElement)) renderAll(); },250);
  }else{
    renderAll();
  }
}
function renderAll(){renderQuickLinks();renderCentralTabs();renderList();renderDetail();renderMainView();renderSidebar();renderKpis();
  setTimeout(initRightDragDrop,0);
}

document.addEventListener('input',function(ev){
